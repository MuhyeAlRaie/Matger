<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | Login</title>
    <meta name="description" content="سجل دخولك للوصول إلى حسابك وطلباتك.">
    
    <!-- Bootstrap 5.3 RTL -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    
    <style>
        body {
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .login-card {
            max-width: 400px;
            margin: auto;
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-store me-2"></i> <span data-i18n="store_name">متجري</span>
            </a>
        </div>
    </nav>

    <!-- MAIN CONTENT -->
    <main class="container flex-grow-1 d-flex align-items-center justify-content-center py-5">
        <div class="card login-card p-4">
            <div class="card-body">
                <div class="text-center mb-4">
                    <h3 class="fw-bold">أهلاً بك مجدداً</h3>
                    <p class="text-muted">قم بتسجيل الدخول للمتابعة</p>
                </div>

                <!-- Alert Container for Auth Messages -->
                <div id="auth-alert" style="display: none;"></div>

                <form id="login-form">
                    <div class="mb-3">
                        <label for="login-email" class="form-label">البريد الإلكتروني</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                            <input type="email" class="form-control" id="login-email" placeholder="name@example.com" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="login-password" class="form-label">كلمة المرور</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" class="form-control" id="login-password" placeholder="********" required>
                        </div>
                        <div class="text-end mt-1">
                            <a href="#" class="text-decoration-none small">نسيت كلمة المرور؟</a>
                        </div>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg fw-bold">
                            تسجيل الدخول
                        </button>
                    </div>
                </form>

                <div class="text-center mt-4">
                    <p class="mb-0">ليس لديك حساب؟ <a href="register.html" class="fw-bold text-primary">إنشاء حساب جديد</a></p>
                </div>
                
                <hr>
                
                <div class="text-center">
                    <a href="index.html" class="btn btn-outline-secondary btn-sm">
                        <i class="fas fa-arrow-right me-1"></i> العودة للرئيسية
                    </a>
                </div>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="bg-dark text-white text-center py-3">
        <small>&copy; 2023 متجري. All Rights Reserved.</small>
    </footer>

    <!-- SCRIPTS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <!-- app.js included to ensure Language settings persist if needed -->
    <script src="js/app.js"></script> 
</body>
</html>
