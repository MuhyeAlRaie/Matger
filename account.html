<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حسابي | My Account</title>
    
    <!-- Bootstrap 5.3 RTL CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <!-- Custom Modern CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- =========================================
         MODERN NAVIGATION
         ========================================= -->
    <nav class="navbar navbar-expand-lg navbar-light sticky-top">
        <div class="container">
            <!-- Brand -->
<a class="navbar-brand" href="index.html">
    <!-- Update 'src' to your actual logo file path -->
    <img src="images/loomi-logo.png" alt="Store Logo" class="brand-logo">
</a>

            <div class="d-flex align-items-center gap-3 order-lg-3">
                <a href="cart.html" class="btn rounded-pill position-relative btn-sm">
                    <i class="bi bi-cart3"></i>
                    <span id="cart-count" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
                </a>
                <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
            </div>

            <div class="collapse navbar-collapse order-lg-2" id="mainNav">
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link fw-bold" href="index.html" data-i18n="nav_home">الرئيسية</a></li>
                    <li class="nav-item"><a class="nav-link" href="category.html" data-i18n="nav_categories">الأقسام</a></li>
                </ul>
                
                <div class="d-flex align-items-center gap-3">
                    <button id="lang-toggle" class="btn btn-outline-primary rounded-pill btn-sm">English</button>
                    <div id="auth-buttons">
                        <a href="login.html" class="btn btn-sm btn-light rounded-pill"><i class="bi bi-person-circle"></i></a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- =========================================
         MAIN DASHBOARD CONTENT
         ========================================= -->
    <main class="container my-5">
        <div class="row">
            
            <!-- LEFT COLUMN: User Sidebar -->
            <div class="col-lg-4 mb-4">
                <!-- Profile Card -->
                <div class="card shadow-sm border-0 rounded-4 mb-4 text-center">
                    <div class="card-body p-5">
                        <div class="mb-3">
                            <i class="bi bi-person-circle display-1 " id="person-icon"></i>
                        </div>
                        <h5 id="user-display-name" class="fw-bold text-dark mb-1">Loading...</h5>
                        <p class="text-muted small" id="account-email">...</p>
                    </div>
                </div>

                <!-- Navigation Menu -->
                <div class="list-group shadow-sm rounded-4 border-0 overflow-hidden">
                    <button class="list-group-item list-group-item-action border-0 py-3 active" id="btn-profile" onclick="switchTab('profile')">
                        <i class="bi bi-person me-2 text-primary"></i> Profile Info
                    </button>
                    <button class="list-group-item list-group-item-action border-0 py-3" id="btn-orders" onclick="switchTab('orders')">
                        <i class="bi bi-bag-check me-2 text-primary"></i> Order History
                    </button>
                    <button class="list-group-item list-group-item-action border-0 py-3" id="btn-security" onclick="switchTab('security')">
                        <i class="bi bi-shield-lock me-2 text-primary"></i> Security & Password
                    </button>
                </div>
            </div>

            <!-- RIGHT COLUMN: Content Area -->
            <div class="col-lg-8">
                
                <!-- Tab 1: Profile Info -->
                <div id="tab-profile" class="account-tab">
                    <div class="card border-0 shadow-sm rounded-4">
                        <div class="card-header bg-white border-0 py-3 px-4">
                            <h5 class="mb-0 fw-bold text-dark">Personal Information</h5>
                        </div>
                        <div class="card-body p-4">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="small text-muted fw-bold text-uppercase">User ID</label>
                                    <div id="account-id" class="fw-bold text-dark p-2 bg-light rounded-3">---</div>
                                </div>
                                <div class="col-md-6">
                                    <label class="small text-muted fw-bold text-uppercase">Member Since</label>
                                    <div id="account-created" class="fw-bold text-dark p-2 bg-light rounded-3">---</div>
                                </div>
                            </div>
                            <div class="alert alert-info rounded-3 border-0 mt-4">
                                <i class="bi bi-info-circle-fill me-2"></i>
                                To update your email address or personal details, please contact support.
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Tab 2: Orders -->
                <div id="tab-orders" class="account-tab d-none">
                    <div class="card border-0 shadow-sm rounded-4">
                        <div class="card-header bg-white border-0 py-3 px-4">
                            <h5 class="mb-0 fw-bold text-dark">Order History</h5>
                        </div>
                        <div class="card-body p-4">
                            <div id="orders-container">
                                <!-- Orders injected by auth.js -->
                                <div class="text-center py-5">
                                    <div class="spinner-border text-primary" role="status"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Tab 3: Security -->
                <div id="tab-security" class="account-tab d-none">
                    <div class="card border-0 shadow-sm rounded-4">
                        <div class="card-header bg-white border-0 py-3 px-4">
                            <h5 class="mb-0 fw-bold text-dark">Change Password</h5>
                        </div>
                        <div class="card-body p-4">
                            <form id="update-password-form">
                                <div id="password-msg" class="mb-3"></div>
                                
                                <div class="mb-3">
                                    <label class="form-label small text-muted fw-bold text-uppercase">Current Password</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
                                        <input type="password" id="current-password" class="form-control border-start-0 ps-0" required>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label small text-muted fw-bold text-uppercase">New Password</label>
                                        <div class="input-group">
                                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-key text-muted"></i></span>
                                            <input type="password" id="new-password" class="form-control border-start-0 ps-0" required minlength="6">
                                        </div>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label small text-muted fw-bold text-uppercase">Confirm New Password</label>
                                        <div class="input-group">
                                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-check2-all text-muted"></i></span>
                                            <input type="password" id="confirm-password" class="form-control border-start-0 ps-0" required minlength="6">
                                        </div>
                                    </div>
                                </div>
                                <button type="submit" class="btn btn-primary rounded-pill px-4">Update Password</button>
                            </form>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <!-- =========================================
         FOOTER
         ========================================= -->
    <footer class="bg-white border-top mt-5 py-5">
        <div class="container text-center">
            <p class="mb-0 text-muted small">&copy; 2023 <span data-i18n="store_name">Loomi</span>. All Rights Reserved.</p>
        </div>
    </footer>

    <!-- Toast Container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toast-container"></div>

    <!-- =========================================
         SCRIPTS
         ========================================= -->
    
    <!-- 1. Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    
    <!-- 2. Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- 3. Application Logic -->
    <script src="js/supabase-config.js"></script>
    <script src="js/app.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/auth.js"></script>

    <!-- Page Specific Script -->
    <script>
        // Simple Tab Switcher
        function switchTab(tabName) {
            document.querySelectorAll('.account-tab').forEach(el => el.classList.add('d-none'));
            document.querySelectorAll('.list-group-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${tabName}`).classList.remove('d-none');
            document.getElementById(`btn-${tabName}`).classList.add('active');
        }

        document.addEventListener('DOMContentLoaded', async () => {

            
            // CRITICAL: Check Session directly instead of relying on auth.js variable timing
            const { data: { session }, error } = await supabase.auth.getSession();

            if (error || !session) {
                console.warn("Account Page: No session found. Redirecting to login.");
                window.location.href = 'login.html';
                return;
            }

            // If we are here, we ARE logged in.
            console.log("Account Page: Session Verified for", session.user.email);
            
            // Manually update the global variable for other functions
            currentUser = session.user;

            // Load Data
            loadAccountDetails();
            
            
        if(currentUser) {
            // Try to get the stored display_name first
            const displayName = currentUser.user_metadata?.display_name || currentUser.email.split('@')[0];
            document.getElementById('user-display-name').textContent = displayName;
        }
        });

        // Load Account Details Wrapper
        async function loadAccountDetails() {
            // Load Orders (Logic copied from auth.js context to ensure it runs)
            const container = document.getElementById('orders-container');
            if(!container) return;

            try {
                const { data: orders, error } = await supabase
                    .from('orders')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (!orders || orders.length === 0) {
                    container.innerHTML = `<div class="text-center py-5 text-muted"><i class="bi bi-inbox display-4 mb-3"></i><br>No previous orders found.</div>`;
                    return;
                }

                // Render Orders (Modern List Style)
                container.innerHTML = orders.map(order => {
                    const statusColor = 
                        order.status === 'delivered' ? 'text-success' : 
                        order.status === 'shipped' ? 'text-primary' : 
                        order.status === 'cancelled' ? 'text-danger' : 'text-warning';
                    
                    return `
                    <div class="card mb-3 border-0 shadow-sm rounded-3">
                        <div class="card-body p-3 d-flex justify-content-between align-items-center">
                            <div>
                                <div class="fw-bold text-dark mb-1">Order #${order.id.slice(0,8)}</div>
                                <div class="small text-muted">${new Date(order.created_at).toLocaleDateString()}</div>
                            </div>
                            <div class="text-end">
                                <div class="h5 mb-0 fw-bold text-primary">${order.total_amount.toFixed(2)} JOD</div>
                                <span class="badge rounded-pill bg-light text-dark border small">${order.status.toUpperCase()}</span>
                            </div>
                        </div>
                    </div>`;
                }).join('');

            } catch (err) {
                console.error("Error loading orders:", err);
            }

            // Update Profile UI Fields
            if(currentUser) {
                document.getElementById('account-id').textContent = currentUser.id;
                document.getElementById('account-created').textContent = new Date(currentUser.created_at).toLocaleDateString();
                document.getElementById('account-email').textContent = currentUser.email;
            }
        }
    </script>
</body>
</html>
