<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Regions</title>
    
    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background-color: #212529; color: white; }
        .sidebar .nav-link { color: #adb5bd; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background-color: #343a40; color: white; }
    </style>
</head>
<body>

    <div class="container-fluid">
        <div class="row">
            
            <!-- Sidebar -->
            <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse p-3">
                <h4 class="text-center mb-4 text-white">Admin Panel</h4>
                <ul class="nav flex-column">
                    <li class="nav-item mb-2"><a class="nav-link" href="index.html"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a></li>
                    <li class="nav-item mb-2"><a class="nav-link" href="products.html"><i class="bi bi-box-seam me-2"></i> Products</a></li>
                    <li class="nav-item mb-2"><a class="nav-link" href="categories.html"><i class="bi bi-tags me-2"></i> Categories</a></li>
                    <li class="nav-item mb-2"><a class="nav-link" href="orders.html"><i class="bi bi-receipt me-2"></i> Orders</a></li>
                    <li class="nav-item mb-2"><a class="nav-link" href="banners.html"><i class="bi bi-images me-2"></i> Banners</a></li>
                    <li class="nav-item mb-2"><a class="nav-link" href="special-offers.html"><i class="bi bi-star-fill me-2"></i> Special Offers</a></li>
                    <li class="nav-item mb-2"><a class="nav-link" href="coupons.html"><i class="bi bi-percent me-2"></i> Coupons</a></li>
                    <li class="nav-item mb-2"><a class="nav-link active" href="regions.html"><i class="bi bi-geo-alt me-2"></i> Regions</a></li>
                    <li class="nav-item mb-2">
    <a class="nav-link" href="notifications.html"><i class="bi bi-megaphone me-2"></i> Notifications</a>
</li>
                    <li class="nav-item mt-4"><hr><a class="nav-link text-danger" href="#" onclick="logoutAdmin()"><i class="bi bi-box-arrow-right me-2"></i> Logout</a></li>
                </ul>
            </nav>

            <!-- Main Content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
                
                <!-- Header -->
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">Delivery Regions</h1>
                    <div class="btn-toolbar mb-2 mb-md-0">
                        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#regionModal" onclick="prepareAddRegion()">
                            <i class="bi bi-plus-lg me-1"></i> Add Region
                        </button>
                    </div>
                </div>

                <!-- Regions Table -->
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th class="ps-4">Region Name (Arabic)</th>
                                        <th>Region Name (English)</th>
                                        <th>Delivery Cost</th>
                                        <th class="text-end pe-4">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="regions-table-body">
                                    <!-- Populated by JS -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <!-- Region Modal (Add/Edit) -->
    <div class="modal fade" id="regionModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="regionModalLabel">Add Region</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="region-form">
                        <input type="hidden" id="region-id">
                        
                        <div class="mb-3">
                            <label class="form-label">Region Name (Arabic)</label>
                            <input type="text" class="form-control" id="region-name-ar" required placeholder="e.g. عمان">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Region Name (English)</label>
                            <input type="text" class="form-control" id="region-name-en" required placeholder="e.g. Amman">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Delivery Cost (JOD)</label>
                            <input type="number" step="0.01" class="form-control" id="region-cost" required placeholder="0.00">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" onclick="saveRegion()">Save Region</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="admin-auth.js"></script>

    <!-- Page Logic -->
    <script>
        let regionModal;

        document.addEventListener('DOMContentLoaded', async () => {
            regionModal = new bootstrap.Modal(document.getElementById('regionModal'));
            await loadRegions();
        });

        async function loadRegions() {
            const tbody = document.getElementById('regions-table-body');
            tbody.innerHTML = '<tr><td colspan="4" class="text-center">Loading...</td></tr>';

            const { data: regions, error } = await supabase
                .from('delivery_regions')
                .select('*')
                .order('cost', { ascending: true });

            if (error) {
                tbody.innerHTML = `<tr><td colspan="4" class="text-center text-danger">Error loading regions</td></tr>`;
                return;
            }

            if (regions.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="text-center text-muted">No regions found.</td></tr>`;
                return;
            }

            tbody.innerHTML = regions.map(region => `
                <tr>
                    <td class="ps-4 fw-bold">${region.region_name_ar}</td>
                    <td>${region.region_name_en}</td>
                    <td class="fw-bold text-success">${region.cost.toFixed(2)} JOD</td>
                    <td class="text-end pe-4">
                        <button class="btn btn-sm btn-outline-primary me-1" onclick="editRegion(${region.id})"><i class="bi bi-pencil"></i></button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteRegion(${region.id})"><i class="bi bi-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function prepareAddRegion() {
            document.getElementById('region-form').reset();
            document.getElementById('region-id').value = '';
            document.getElementById('regionModalLabel').textContent = 'Add Region';
        }

        function editRegion(id) {
            supabase.from('delivery_regions').select('*').eq('id', id).single().then(({ data }) => {
                if (data) {
                    document.getElementById('region-id').value = data.id;
                    document.getElementById('region-name-ar').value = data.region_name_ar;
                    document.getElementById('region-name-en').value = data.region_name_en;
                    document.getElementById('region-cost').value = data.cost;

                    document.getElementById('regionModalLabel').textContent = 'Edit Region';
                    regionModal.show();
                }
            });
        }

        async function saveRegion() {
            const id = document.getElementById('region-id').value;
            const regionData = {
                region_name_ar: document.getElementById('region-name-ar').value,
                region_name_en: document.getElementById('region-name-en').value,
                cost: parseFloat(document.getElementById('region-cost').value)
            };

            let error;
            if (id) {
                const result = await supabase.from('delivery_regions').update(regionData).eq('id', id);
                error = result.error;
            } else {
                const result = await supabase.from('delivery_regions').insert([regionData]);
                error = result.error;
            }

            if (error) {
                alert('Error saving region: ' + error.message);
            } else {
                regionModal.hide();
                loadRegions();
            }
        }

        async function deleteRegion(id) {
            if (confirm('Are you sure you want to delete this region? This may affect existing orders.')) {
                const { error } = await supabase.from('delivery_regions').delete().eq('id', id);
                if (error) {
                    alert('Error deleting region: ' + error.message);
                } else {
                    loadRegions();
                }
            }
        }

        async function logoutAdmin() {
            await supabase.auth.signOut();
            window.location.href = '../login.html';
        }
    </script>
</body>
</html>
