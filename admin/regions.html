<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إشاء المناطق</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --sidebar-width: 250px; } body { background-color: #f4f6f9; }
        #sidebar { width: var(--sidebar-width); height: 100vh; position: fixed; right: 0; background: #343a40; color: #fff; }
        #content { margin-right: var(--sidebar-width); }
        .sidebar-link { color: rgba(255,255,255,0.8); padding: 12px 20px; display: block; text-decoration: none; }
        .sidebar-link:hover, .sidebar-link.active { background: #495057; color: #fff; border-right: 4px solid #0d6efd; }
    </style>
</head>
<body>
    <nav id="sidebar">
        <div class="p-3 border-bottom border-secondary"><h5>Admin Panel</h5></div>
        <ul class="list-unstyled p-2">
            <li><a href="index.html" class="sidebar-link">الرئيسية</a></li>
            <li><a href="regions.html" class="sidebar-link active">مناطق التوصيل</a></li>
            <li><a href="../index.html" class="sidebar-link">عرض المتجر</a></li>
        </ul>
    </nav>
    <div id="content">
        <nav class="navbar navbar-light bg-white shadow-sm p-3"><button class="btn btn-light"><i class="fas fa-bars"></i></button></nav>
        <div class="container-fluid p-4">
            <button class="btn btn-primary mb-3" onclick="openModal()">إضافة منطقة</button>
            <div class="card shadow-sm"><div class="card-body p-0">
                <table class="table mb-0"><thead><tr><th>الاسم (عربي)</th><th>الاسم (إنجليزي)</th><th>سعر التوصيل</th><th>إجراءات</th></tr></thead><tbody id="table-body"></tbody></table>
            </div></div>
        </div>
    </div>

    <div class="modal fade" id="regModal" tabindex="-1">
        <div class="modal-dialog"><div class="modal-content">
            <div class="modal-header"><h5 class="modal-title">منطقة جديدة</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <input type="hidden" id="r-id">
                <input type="text" id="r-name-ar" class="form-control mb-2" placeholder="الاسم (عربي)">
                <input type="text" id="r-name-en" class="form-control mb-2" placeholder="الاسم (إنجليزي)">
                <input type="number" id="r-price" class="form-control" placeholder="سعر التوصيل (JOD)">
            </div>
            <div class="modal-footer"><button class="btn btn-primary" onclick="saveReg()">حفظ</button></div>
        </div></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="admin-auth.js"></script>
    <script>
        let regModal = new bootstrap.Modal(document.getElementById('regModal'));
        async function load() {
            const { data } = await supabase.from('delivery_regions').select('*');
            document.getElementById('table-body').innerHTML = data.map(r => `
                <tr><td>${r.region_name_ar}</td><td>${r.region_name_en}</td><td>${r.delivery_price} JOD</td>
                <td><button class="btn btn-sm btn-outline-primary" onclick='edit(${JSON.stringify(r)})'>تعديل</button> <button class="btn btn-sm btn-outline-danger" onclick="del(${r.id})">حذف</button></td></tr>`).join('');
        }
        function openModal() { document.getElementById('r-id').value=''; document.getElementById('r-name-ar').value=''; document.getElementById('r-name-en').value=''; document.getElementById('r-price').value=''; regModal.show(); }
        function edit(r) { document.getElementById('r-id').value=r.id; document.getElementById('r-name-ar').value=r.region_name_ar; document.getElementById('r-name-en').value=r.region_name_en; document.getElementById('r-price').value=r.delivery_price; regModal.show(); }
        async function saveReg() {
            const id = document.getElementById('r-id').value;
            const obj = { region_name_ar: document.getElementById('r-name-ar').value, region_name_en: document.getElementById('r-name-en').value, delivery_price: document.getElementById('r-price').value };
            if(id) await supabase.from('delivery_regions').update(obj).eq('id', id);
            else await supabase.from('delivery_regions').insert([obj]);
            regModal.hide(); load();
        }
        async function del(id) { if(confirm('حذف؟')) { await supabase.from('delivery_regions').delete().eq('id', id); load(); } }
        load();
    </script>
</body>
</html>
