<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Coupons</title>
    
    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background-color: #212529; color: white; }
        .sidebar .nav-link { color: #adb5bd; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background-color: #343a40; color: white; }
    </style>
</head>
<body>

    <div class="container-fluid">
        <div class="row">
            
            <!-- Sidebar -->
            <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse p-3">
                <h4 class="text-center mb-4 text-white">Admin Panel</h4>
                <ul class="nav flex-column">
                    <li class="nav-item mb-2"><a class="nav-link" href="index.html"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a></li>
                    <li class="nav-item mb-2"><a class="nav-link" href="products.html"><i class="bi bi-box-seam me-2"></i> Products</a></li>
                    <li class="nav-item mb-2"><a class="nav-link" href="categories.html"><i class="bi bi-tags me-2"></i> Categories</a></li>
                    <li class="nav-item mb-2"><a class="nav-link" href="orders.html"><i class="bi bi-receipt me-2"></i> Orders</a></li>
                    <li class="nav-item mb-2"><a class="nav-link" href="banners.html"><i class="bi bi-images me-2"></i> Banners</a></li>
                    <li class="nav-item mb-2"><a class="nav-link active" href="coupons.html"><i class="bi bi-percent me-2"></i> Coupons</a></li>
                    <li class="nav-item mb-2"><a class="nav-link" href="regions.html"><i class="bi bi-geo-alt me-2"></i> Regions</a></li>
                    <li class="nav-item mb-2">
    <a class="nav-link" href="notifications.html"><i class="bi bi-megaphone me-2"></i> Notifications</a>
</li>
                    <li class="nav-item mt-4"><hr><a class="nav-link text-danger" href="#" onclick="logoutAdmin()"><i class="bi bi-box-arrow-right me-2"></i> Logout</a></li>
                </ul>
            </nav>

            <!-- Main Content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
                
                <!-- Header -->
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">Discount Coupons</h1>
                    <div class="btn-toolbar mb-2 mb-md-0">
                        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#couponModal" onclick="prepareAddCoupon()">
                            <i class="bi bi-plus-lg me-1"></i> Add Coupon
                        </button>
                    </div>
                </div>

                <!-- Coupons Table -->
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th class="ps-4">Code</th>
                                        <th>Type</th>
                                        <th>Value</th>
                                        <th>Status</th>
                                        <th class="text-end pe-4">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="coupons-table-body">
                                    <!-- Populated by JS -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <!-- Coupon Modal (Add/Edit) -->
    <div class="modal fade" id="couponModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="couponModalLabel">Add Coupon</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="coupon-form">
                        <input type="hidden" id="coupon-id">
                        
                        <div class="mb-3">
                            <label class="form-label">Coupon Code</label>
                            <input type="text" class="form-control text-uppercase fw-bold" id="coupon-code" required placeholder="e.g. SUMMER2023">
                            <div class="form-text">Code will be converted to uppercase.</div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Discount Type</label>
                            <select id="coupon-type" class="form-select" required onchange="toggleValueLabel()">
                                <option value="percentage">Percentage (%)</option>
                                <option value="fixed">Fixed Amount (JOD)</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" id="coupon-value-label">Discount Value</label>
                            <input type="number" step="0.01" class="form-control" id="coupon-value" required>
                        </div>

                        <div class="form-check mt-4">
                            <input class="form-check-input" type="checkbox" id="coupon-active" checked>
                            <label class="form-check-label" for="coupon-active">Is Active</label>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" onclick="saveCoupon()">Save Coupon</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="admin-auth.js"></script>

    <!-- Page Logic -->
    <script>
        let couponModal;

        document.addEventListener('DOMContentLoaded', async () => {
            couponModal = new bootstrap.Modal(document.getElementById('couponModal'));
            await loadCoupons();
        });

        function toggleValueLabel() {
            const type = document.getElementById('coupon-type').value;
            const label = document.getElementById('coupon-value-label');
            label.textContent = type === 'percentage' ? 'Discount Percentage (%)' : 'Discount Amount (JOD)';
        }

        async function loadCoupons() {
            const tbody = document.getElementById('coupons-table-body');
            tbody.innerHTML = '<tr><td colspan="5" class="text-center">Loading...</td></tr>';

            const { data: coupons, error } = await supabase
                .from('coupons')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                tbody.innerHTML = `<tr><td colspan="5" class="text-center text-danger">Error loading coupons</td></tr>`;
                return;
            }

            if (coupons.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="text-center text-muted">No coupons found.</td></tr>`;
                return;
            }

            tbody.innerHTML = coupons.map(coupon => {
                const typeIcon = coupon.discount_type === 'percentage' 
                    ? '<i class="bi bi-percent text-primary"></i>' 
                    : '<i class="bi bi-currency-dollar text-success"></i>';
                
                const displayValue = coupon.discount_type === 'percentage' 
                    ? coupon.value + '%' 
                    : coupon.value + ' JOD';

                return `
                <tr>
                    <td class="ps-4">
                        <span class="badge bg-light text-dark border fw-bold fs-6">${coupon.code}</span>
                    </td>
                    <td>${typeIcon} <span class="ms-1 text-capitalize">${coupon.discount_type}</span></td>
                    <td class="fw-bold">${displayValue}</td>
                    <td>
                        <span class="badge ${coupon.is_active ? 'bg-success' : 'bg-secondary'}">
                            ${coupon.is_active ? 'Active' : 'Inactive'}
                        </span>
                    </td>
                    <td class="text-end pe-4">
                        <button class="btn btn-sm btn-outline-primary me-1" onclick="editCoupon(${coupon.id})"><i class="bi bi-pencil"></i></button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteCoupon(${coupon.id})"><i class="bi bi-trash"></i></button>
                    </td>
                </tr>`;
            }).join('');
        }

        function prepareAddCoupon() {
            document.getElementById('coupon-form').reset();
            document.getElementById('coupon-id').value = '';
            document.getElementById('couponModalLabel').textContent = 'Add Coupon';
            toggleValueLabel();
        }

        function editCoupon(id) {
            supabase.from('coupons').select('*').eq('id', id).single().then(({ data }) => {
                if (data) {
                    document.getElementById('coupon-id').value = data.id;
                    document.getElementById('coupon-code').value = data.code;
                    document.getElementById('coupon-type').value = data.discount_type;
                    document.getElementById('coupon-value').value = data.value;
                    document.getElementById('coupon-active').checked = data.is_active;

                    toggleValueLabel();
                    document.getElementById('couponModalLabel').textContent = 'Edit Coupon';
                    couponModal.show();
                }
            });
        }

        async function saveCoupon() {
            const id = document.getElementById('coupon-id').value;
            
            // Force code to uppercase
            const code = document.getElementById('coupon-code').value.toUpperCase();
            
            const couponData = {
                code: code,
                discount_type: document.getElementById('coupon-type').value,
                value: parseFloat(document.getElementById('coupon-value').value),
                is_active: document.getElementById('coupon-active').checked
            };

            // Check uniqueness for new coupons
            if (!id) {
                const { data: existing } = await supabase.from('coupons').select('id').eq('code', code).single();
                if (existing) {
                    alert('Error: Coupon code already exists.');
                    return;
                }
            }

            let error;
            if (id) {
                const result = await supabase.from('coupons').update(couponData).eq('id', id);
                error = result.error;
            } else {
                const result = await supabase.from('coupons').insert([couponData]);
                error = result.error;
            }

            if (error) {
                alert('Error saving coupon: ' + error.message);
            } else {
                couponModal.hide();
                loadCoupons();
            }
        }

        async function deleteCoupon(id) {
            if (confirm('Are you sure you want to delete this coupon?')) {
                const { error } = await supabase.from('coupons').delete().eq('id', id);
                if (error) {
                    alert('Error deleting coupon: ' + error.message);
                } else {
                    loadCoupons();
                }
            }
        }

        async function logoutAdmin() {
            await supabase.auth.signOut();
            window.location.href = '../login.html';
        }
    </script>
</body>
</html>
