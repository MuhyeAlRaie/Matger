<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة الكوبونات</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --sidebar-width: 250px; } body { background-color: #f4f6f9; }
        #sidebar { width: var(--sidebar-width); height: 100vh; position: fixed; right: 0; background: #343a40; color: #fff; }
        #content { margin-right: var(--sidebar-width); }
        .sidebar-link { color: rgba(255,255,255,0.8); padding: 12px 20px; display: block; text-decoration: none; }
        .sidebar-link:hover, .sidebar-link.active { background: #495057; color: #fff; border-right: 4px solid #0d6efd; }
    </style>
</head>
<body>
    <nav id="sidebar">
        <div class="p-3 border-bottom border-secondary"><h5>Admin Panel</h5></div>
        <ul class="list-unstyled p-2">
            <li><a href="index.html" class="sidebar-link">الرئيسية</a></li>
            <li><a href="coupons.html" class="sidebar-link active">الكوبونات</a></li>
            <li><a href="../index.html" class="sidebar-link">عرض المتجر</a></li>
        </ul>
    </nav>
    <div id="content">
        <nav class="navbar navbar-light bg-white shadow-sm p-3"><button class="btn btn-light"><i class="fas fa-bars"></i></button></nav>
        <div class="container-fluid p-4">
            <button class="btn btn-primary mb-3" onclick="openModal()">إضافة كوبون</button>
            <div class="card shadow-sm"><div class="card-body p-0">
                <table class="table mb-0"><thead><tr><th>الكود</th><th>نسبة الخصم</th><th>تاريخ الانتهاء</th><th>إجراءات</th></tr></thead><tbody id="table-body"></tbody></table>
            </div></div>
        </div>
    </div>

    <div class="modal fade" id="coupModal" tabindex="-1">
        <div class="modal-dialog"><div class="modal-content">
            <div class="modal-header"><h5 class="modal-title">كوبون جديد</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <input type="text" id="cp-code" class="form-control mb-2" placeholder="كود الكوبون (مثال: SALE20)">
                <input type="number" id="cp-discount" class="form-control mb-2" placeholder="نسبة الخصم (مثال: 20)">
                <label>تاريخ الانتهاء</label>
                <input type="date" id="cp-date" class="form-control">
            </div>
            <div class="modal-footer"><button class="btn btn-primary" onclick="saveCoup()">حفظ</button></div>
        </div></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="admin-auth.js"></script>
    <script>
        let coupModal = new bootstrap.Modal(document.getElementById('coupModal'));
        async function load() {
            const { data } = await supabase.from('coupons').select('*');
            document.getElementById('table-body').innerHTML = data.map(c => `
                <tr><td><span class="badge bg-secondary">${c.code}</span></td><td>${c.discount_percent}%</td><td>${c.expiration_date.split('T')[0]}</td>
                <td><button class="btn btn-sm btn-outline-danger" onclick="del('${c.id}')">حذف</button></td></tr>`).join('');
        }
        function openModal() { document.getElementById('cp-code').value=''; document.getElementById('cp-discount').value=''; document.getElementById('cp-date').value=''; coupModal.show(); }
        async function saveCoup() {
            const obj = { code: document.getElementById('cp-code').value, discount_percent: document.getElementById('cp-discount').value, expiration_date: document.getElementById('cp-date').value };
            await supabase.from('coupons').insert([obj]);
            coupModal.hide(); load();
        }
        async function del(id) { if(confirm('حذف؟')) { await supabase.from('coupons').delete().eq('id', id); load(); } }
        load();
    </script>
</body>
</html>
