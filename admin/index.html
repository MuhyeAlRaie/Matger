<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | Admin Dashboard</title>
    
    <!-- Bootstrap 5.3 RTL -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom Admin Styles (Extends main style.css) -->
    <style>
        :root {
            --sidebar-width: 250px;
        }
        body {
            background-color: #f4f6f9;
            overflow-x: hidden;
        }
        #sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            position: fixed;
            top: 0;
            right: 0;
            background: #343a40;
            color: #fff;
            transition: all 0.3s;
            z-index: 1000;
        }
        html[dir="ltr"] #sidebar {
            right: auto;
            left: 0;
        }
        #content {
            margin-right: var(--sidebar-width);
            transition: all 0.3s;
        }
        html[dir="ltr"] #content {
            margin-right: 0;
            margin-left: var(--sidebar-width);
        }
        .sidebar-link {
            color: rgba(255,255,255,0.8);
            padding: 12px 20px;
            display: block;
            text-decoration: none;
        }
        .sidebar-link:hover, .sidebar-link.active {
            background: #495057;
            color: #fff;
            border-right: 4px solid #0d6efd;
        }
        html[dir="ltr"] .sidebar-link:hover, html[dir="ltr"] .sidebar-link.active {
            border-right: none;
            border-left: 4px solid #0d6efd;
        }
        .stat-card {
            border: none;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
        }
        @media (max-width: 768px) {
            #sidebar { margin-right: calc(var(--sidebar-width) * -1); }
            html[dir="ltr"] #sidebar { margin-left: calc(var(--sidebar-width) * -1); margin-right: 0; }
            #sidebar.active { margin-right: 0; }
            html[dir="ltr"] #sidebar.active { margin-left: 0; }
            #content { margin-right: 0; margin-left: 0; }
        }
    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <nav id="sidebar">
        <div class="sidebar-header p-3 border-bottom border-secondary">
            <h4 class="mb-0"><i class="fas fa-cogs me-2"></i> Admin</h4>
        </div>
        <ul class="list-unstyled p-2">
            <li><a href="index.html" class="sidebar-link active"><i class="fas fa-tachometer-alt me-2"></i> الرئيسية</a></li>
            <li><a href="products.html" class="sidebar-link"><i class="fas fa-box me-2"></i> المنتجات</a></li>
            <li><a href="categories.html" class="sidebar-link"><i class="fas fa-list me-2"></i> التصنيفات</a></li>
            <li><a href="orders.html" class="sidebar-link"><i class="fas fa-shopping-bag me-2"></i> الطلبات</a></li>
            <li><a href="banners.html" class="sidebar-link"><i class="fas fa-images me-2"></i> البنرات</a></li>
            <li><a href="coupons.html" class="sidebar-link"><i class="fas fa-tags me-2"></i> الكوبونات</a></li>
            <li><a href="../index.html" class="sidebar-link"><i class="fas fa-external-link-alt me-2"></i> عرض المتجر</a></li>
        </ul>
    </nav>

    <!-- MAIN CONTENT -->
    <div id="content">
        <!-- Top Navbar -->
        <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm mb-4">
            <div class="container-fluid">
                <button type="button" id="sidebarCollapse" class="btn btn-light">
                    <i class="fas fa-bars"></i>
                </button>
                
                <div class="ms-auto d-flex align-items-center">
                    <span class="me-3 text-muted" id="admin-username">Admin</span>
                    <button class="btn btn-outline-danger btn-sm" onclick="handleLogout()">
                        <i class="fas fa-sign-out-alt"></i> خروج
                    </button>
                </div>
            </div>
        </nav>

        <!-- Dashboard Stats -->
        <div class="container-fluid px-4">
            <div class="row g-4 mb-4">
                <div class="col-md-3">
                    <div class="card stat-card bg-primary text-white p-3">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="mb-0">إجمالي الطلبات</h6>
                                <h2 class="mb-0 mt-2" id="stat-orders">0</h2>
                            </div>
                            <i class="fas fa-shopping-cart fa-2x opacity-50"></i>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card stat-card bg-success text-white p-3">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="mb-0">إجمالي المبيعات</h6>
                                <h2 class="mb-0 mt-2" id="stat-revenue">0 JOD</h2>
                            </div>
                            <i class="fas fa-coins fa-2x opacity-50"></i>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card stat-card bg-warning text-dark p-3">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="mb-0">المنتجات</h6>
                                <h2 class="mb-0 mt-2" id="stat-products">0</h2>
                            </div>
                            <i class="fas fa-box-open fa-2x opacity-50"></i>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card stat-card bg-info text-white p-3">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="mb-0">المستخدمين</h6>
                                <h2 class="mb-0 mt-2" id="stat-users">0</h2>
                            </div>
                            <i class="fas fa-users fa-2x opacity-50"></i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Recent Orders Table -->
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">أحدث الطلبات</h5>
                    <a href="orders.html" class="btn btn-sm btn-primary">عرض الكل</a>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>#</th>
                                    <th>العميل</th>
                                    <th>التاريخ</th>
                                    <th>الحالة</th>
                                    <th class="text-end">الإجمالي</th>
                                </tr>
                            </thead>
                            <tbody id="recent-orders-body">
                                <tr>
                                    <td colspan="5" class="text-center py-4">
                                        <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <!-- Config & Auth -->
    <script src="../js/supabase-config.js"></script>
    <script>
        // Simple Auth Check (In production, use RLS policies or backend verification)
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) {
            window.location.href = '../login.html';
        } else {
            document.getElementById('admin-username').textContent = user.email;
        }

        // Logout
        window.handleLogout = async function() {
            await supabase.auth.signOut();
            localStorage.removeItem('user');
            window.location.href = '../index.html';
        }

        // Toggle Sidebar on Mobile
        document.getElementById('sidebarCollapse').addEventListener('click', function() {
            document.getElementById('sidebar').classList.toggle('active');
        });

        // Apply RTL Direction from App Settings
        const lang = localStorage.getItem('lang') || 'ar';
        document.documentElement.lang = lang;
        document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
        const bootstrapLink = document.querySelector('link[href*="bootstrap"]');
        if (bootstrapLink) {
            const version = "5.3.0";
            bootstrapLink.href = `https://cdn.jsdelivr.net/npm/bootstrap@${version}/dist/css/bootstrap.${lang === 'ar' ? 'rtl' : ''}.min.css`;
        }
    </script>

    <!-- Dashboard Logic -->
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // 1. Fetch Stats
            const [ordersCount, productsCount, usersCount] = await Promise.all([
                supabase.from('orders').select('*', { count: 'exact', head: true }),
                supabase.from('products').select('*', { count: 'exact', head: true }),
                supabase.from('users').select('*', { count: 'exact', head: true }) // Note: 'users' is usually auth.users, but if you have a public 'profiles' table use that. Here we assume a 'profiles' table or similar.
            ]);

            // Note: For revenue, we'd sum the 'total_amount' column in orders.
            const { data: revenueData } = await supabase.from('orders').select('total_amount');
            const revenue = revenueData ? revenueData.reduce((sum, order) => sum + parseFloat(order.total_amount), 0) : 0;

            // Update DOM
            document.getElementById('stat-orders').textContent = ordersCount.count || 0;
            document.getElementById('stat-products').textContent = productsCount.count || 0;
            document.getElementById('stat-users').textContent = usersCount.count || 0; // Will likely be 0 unless 'users' table exists in public schema
            document.getElementById('stat-revenue').textContent = revenue.toFixed(2) + ' JOD';

            // 2. Fetch Recent Orders
            const { data: recentOrders, error } = await supabase
                .from('orders')
                .select('*')
                .order('created_at', { ascending: false })
                .limit(5);

            const tbody = document.getElementById('recent-orders-body');
            tbody.innerHTML = '';

            if (recentOrders && recentOrders.length > 0) {
                recentOrders.forEach(order => {
                    let statusBadge = '';
                    switch(order.status) {
                        case 'new': statusBadge = '<span class="badge bg-danger">جديد</span>'; break;
                        case 'processing': statusBadge = '<span class="badge bg-warning text-dark">قيد المعالجة</span>'; break;
                        case 'shipped': statusBadge = '<span class="badge bg-info text-dark">تم الشحن</span>'; break;
                        case 'delivered': statusBadge = '<span class="badge bg-success">تم التوصيل</span>'; break;
                        default: statusBadge = `<span class="badge bg-secondary">${order.status}</span>`;
                    }

                    const row = `
                        <tr>
                            <td>#${order.id}</td>
                            <td>${order.customer_name || 'Unknown'}</td>
                            <td>${new Date(order.created_at).toLocaleDateString('ar-EG')}</td>
                            <td>${statusBadge}</td>
                            <td class="text-end fw-bold">${parseFloat(order.total_amount).toFixed(2)} JOD</td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });
            } else {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center py-3 text-muted">لا توجد طلبات بعد</td></tr>';
            }
        });
    </script>
</body>
</html>
