<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Special Offers</title>
    
    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background-color: #212529; color: white; }
        .sidebar .nav-link { color: #adb5bd; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background-color: #343a40; color: white; }
        .offer-thumb { width: 100px; height: 100px; object-fit: cover; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse p-3">
                <h4 class="text-center mb-4 text-white">Admin Panel</h4>
                <ul class="nav flex-column">
                    <li class="nav-item mb-2"><a class="nav-link" href="index.html"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a></li>
                    <li class="nav-item mb-2"><a class="nav-link" href="products.html"><i class="bi bi-box-seam me-2"></i> Products</a></li>
                    <li class="nav-item mb-2"><a class="nav-link" href="categories.html"><i class="bi bi-tags me-2"></i> Categories</a></li>
                    <li class="nav-item mb-2"><a class="nav-link" href="orders.html"><i class="bi bi-receipt me-2"></i> Orders</a></li>
                    <li class="nav-item mb-2"><a class="nav-link" href="banners.html"><i class="bi bi-images me-2"></i> Banners</a></li>
                    <li class="nav-item mb-2"><a class="nav-link active" href="special-offers.html"><i class="bi bi-star-fill me-2"></i> Special Offers</a></li>
                    <li class="nav-item mb-2"><a class="nav-link" href="coupons.html"><i class="bi bi-percent me-2"></i> Coupons</a></li>
                    <li class="nav-item mb-2"><a class="nav-link" href="regions.html"><i class="bi bi-geo-alt me-2"></i> Regions</a></li>
                    <li class="nav-item mb-2"><a class="nav-link" href="notifications.html"><i class="bi bi-megaphone me-2"></i> Notifications</a></li>
                    <li class="nav-item mt-4"><hr><a class="nav-link text-danger" href="#" onclick="logoutAdmin()"><i class="bi bi-box-arrow-right me-2"></i> Logout</a></li>
                </ul>
            </nav>

            <!-- Main Content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">Special Offers (Home Slider)</h1>
                    <div class="btn-toolbar mb-2 mb-md-0">
                        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#offerModal" onclick="prepareAddOffer()">
                            <i class="bi bi-plus-lg me-1"></i> Add Offer
                        </button>
                    </div>
                </div>

                <div class="card border-0 shadow-sm">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th class="ps-4">Image</th>
                                        <th>Product</th>
                                        <th>Order</th>
                                        <th>Status</th>
                                        <th class="text-end pe-4">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="offers-table-body">
                                    <!-- Populated by JS -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Offer Modal -->
    <div class="modal fade" id="offerModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="offerModalLabel">Add Offer</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="offer-form">
                        <input type="hidden" id="offer-id">
                        
                        <div class="mb-3">
                            <label class="form-label">Image URL</label>
                            <input type="text" class="form-control" id="offer-image" required placeholder="/images/offers/sale1.jpg">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Link to Product</label>
                            <select id="offer-product" class="form-select" required>
                                <option value="">Loading products...</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Sort Order</label>
                            <input type="number" class="form-control" id="offer-order" value="0">
                        </div>

                        <div class="form-check mt-4">
                            <input class="form-check-input" type="checkbox" id="offer-active" checked>
                            <label class="form-check-label" for="offer-active">Is Active</label>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" onclick="saveOffer()">Save Offer</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="admin-auth.js"></script>

    <script>
        let offerModal;
        let productsList = [];

        document.addEventListener('DOMContentLoaded', async () => {
            offerModal = new bootstrap.Modal(document.getElementById('offerModal'));
            await loadProducts();
            await loadOffers();
        });

        async function loadProducts() {
            const { data } = await supabase.from('products').select('id, name_en, name_ar');
            productsList = data || [];
            const select = document.getElementById('offer-product');
            select.innerHTML = '<option value="">Select Product</option>';
            productsList.forEach(p => {
                select.innerHTML += `<option value="${p.id}">${p.name_en} / ${p.name_ar}</option>`;
            });
        }

        async function loadOffers() {
            const tbody = document.getElementById('offers-table-body');
            const { data: offers, error } = await supabase
                .from('special_offers')
                .select('*, products(name_en)')
                .order('sort_order', { ascending: true });

            if (error) {
                tbody.innerHTML = `<tr><td colspan="5" class="text-center text-danger">Error loading offers</td></tr>`;
                return;
            }

            tbody.innerHTML = offers.map(offer => {
                const prodName = offer.products ? offer.products.name_en : 'Unknown';
                const imgUrl = offer.image_url || 'https://via.placeholder.com/100';
                return `
                <tr>
                    <td class="ps-4"><img src="${imgUrl}" class="offer-thumb"></td>
                    <td>${prodName}</td>
                    <td>${offer.sort_order}</td>
                    <td><span class="badge ${offer.is_active ? 'bg-success' : 'bg-secondary'}">${offer.is_active ? 'Active' : 'Hidden'}</span></td>
                    <td class="text-end pe-4">
                        <button class="btn btn-sm btn-outline-primary me-1" onclick="editOffer(${offer.id})"><i class="bi bi-pencil"></i></button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteOffer(${offer.id})"><i class="bi bi-trash"></i></button>
                    </td>
                </tr>`;
            }).join('');
        }

        function prepareAddOffer() {
            document.getElementById('offer-form').reset();
            document.getElementById('offer-id').value = '';
            document.getElementById('offerModalLabel').textContent = 'Add Offer';
        }

        function editOffer(id) {
            supabase.from('special_offers').select('*').eq('id', id).single().then(({ data }) => {
                if (data) {
                    document.getElementById('offer-id').value = data.id;
                    document.getElementById('offer-image').value = data.image_url;
                    document.getElementById('offer-product').value = data.product_id;
                    document.getElementById('offer-order').value = data.sort_order;
                    document.getElementById('offer-active').checked = data.is_active;
                    document.getElementById('offerModalLabel').textContent = 'Edit Offer';
                    offerModal.show();
                }
            });
        }

        async function saveOffer() {
            const id = document.getElementById('offer-id').value;
            const offerData = {
                image_url: document.getElementById('offer-image').value,
                product_id: parseInt(document.getElementById('offer-product').value),
                sort_order: parseInt(document.getElementById('offer-order').value),
                is_active: document.getElementById('offer-active').checked
            };

            let error;
            if (id) {
                const result = await supabase.from('special_offers').update(offerData).eq('id', id);
                error = result.error;
            } else {
                const result = await supabase.from('special_offers').insert([offerData]);
                error = result.error;
            }

            if (error) {
                alert('Error saving offer: ' + error.message);
            } else {
                offerModal.hide();
                loadOffers();
            }
        }

        async function deleteOffer(id) {
            if (confirm('Delete this offer?')) {
                await supabase.from('special_offers').delete().eq('id', id);
                loadOffers();
            }
        }

        async function logoutAdmin() {
            await supabase.auth.signOut();
            window.location.href = '../login.html';
        }
    </script>
</body>
</html>
