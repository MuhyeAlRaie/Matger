<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Products</title>
    
    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background-color: #212529; color: white; }
        .sidebar .nav-link { color: #adb5bd; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background-color: #343a40; color: white; }
        .product-thumb { width: 50px; height: 50px; object-fit: cover; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="container-fluid">
        <div class="row">
            
            <!-- Sidebar -->
            <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse p-3">
                <h4 class="text-center mb-4 text-white">Admin Panel</h4>
                <ul class="nav flex-column">
                    <li class="nav-item mb-2"><a class="nav-link" href="index.html"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a></li>
                    <li class="nav-item mb-2"><a class="nav-link active" href="products.html"><i class="bi bi-box-seam me-2"></i> Products</a></li>
                    <li class="nav-item mb-2"><a class="nav-link" href="categories.html"><i class="bi bi-tags me-2"></i> Categories</a></li>
                    <li class="nav-item mb-2"><a class="nav-link" href="orders.html"><i class="bi bi-receipt me-2"></i> Orders</a></li>
                    <li class="nav-item mb-2"><a class="nav-link" href="banners.html"><i class="bi bi-images me-2"></i> Banners</a></li>
                    <li class="nav-item mb-2"><a class="nav-link" href="special-offers.html"><i class="bi bi-star-fill me-2"></i> Special Offers</a></li>
                    <li class="nav-item mb-2"><a class="nav-link" href="coupons.html"><i class="bi bi-percent me-2"></i> Coupons</a></li>
                    <li class="nav-item mb-2"><a class="nav-link" href="regions.html"><i class="bi bi-geo-alt me-2"></i> Regions</a></li>
                    <li class="nav-item mb-2">
    <a class="nav-link" href="notifications.html"><i class="bi bi-megaphone me-2"></i> Notifications</a>
</li>
                    <li class="nav-item mt-4"><hr><a class="nav-link text-danger" href="#" onclick="logoutAdmin()"><i class="bi bi-box-arrow-right me-2"></i> Logout</a></li>
                </ul>
            </nav>

            <!-- Main Content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
                
                <!-- Header -->
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">Products</h1>
                    <div class="btn-toolbar mb-2 mb-md-0">
                        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#productModal" onclick="prepareAddProduct()">
                            <i class="bi bi-plus-lg me-1"></i> Add Product
                        </button>
                    </div>
                </div>

                <!-- Products Table -->
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th class="ps-4">Image</th>
                                        <th>Name (AR / EN)</th>
                                        <th>Price</th>
                                        <th>Category</th>
                                        <th>Status</th>
                                        <th class="text-end pe-4">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="products-table-body">
                                    <!-- Populated by JS -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <!-- Product Modal (Add/Edit) -->
    <div class="modal fade" id="productModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="productModalLabel">Add Product</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="product-form">
                        <input type="hidden" id="prod-id">
                        
                        <div class="row g-3">
                            <!-- Names -->
                            <div class="col-md-6">
                                <label class="form-label">Name (Arabic)</label>
                                <input type="text" class="form-control" id="prod-name-ar" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Name (English)</label>
                                <input type="text" class="form-control" id="prod-name-en" required>
                            </div>

                            <!-- Slug -->
                            <div class="col-12">
                                <label class="form-label">Slug (URL)</label>
                                <input type="text" class="form-control" id="prod-slug" required placeholder="e.g. air-fryer-philips">
                            </div>

                            <!-- Prices -->
                            <div class="col-md-6">
                                <label class="form-label">Price (JOD)</label>
                                <input type="number" step="0.01" class="form-control" id="prod-price" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Discount Price (Optional)</label>
                                <input type="number" step="0.01" class="form-control" id="prod-discount">
                            </div>

                            <!-- Image -->
                            <div class="col-12">
                                <label class="form-label">Image URL</label>
                                <input type="text" class="form-control" id="prod-image" placeholder="/images/products/filename.jpg" required>
                                <div class="form-text">Store images in /images folder.</div>
                            </div>

                            <!-- Category -->
                            <div class="col-md-6">
                                <label class="form-label">Category</label>
                                <select id="prod-category" class="form-select" required>
                                    <option value="">Loading categories...</option>
                                </select>
                            </div>

                            <div class="col-md-6 d-flex align-items-center">
                                <div class="form-check mt-4">
                                    <input class="form-check-input" type="checkbox" id="prod-active" checked>
                                    <label class="form-check-label" for="prod-active">Is Active</label>
                                </div>
                            </div>

                            <!-- Descriptions -->
                            <div class="col-12">
                                <label class="form-label">Short Desc (Arabic)</label>
                                <textarea class="form-control" id="prod-short-ar" rows="2"></textarea>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Short Desc (English)</label>
                                <textarea class="form-control" id="prod-short-en" rows="2"></textarea>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Full Desc (Arabic)</label>
                                <textarea class="form-control" id="prod-full-ar" rows="3"></textarea>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Full Desc (English)</label>
                                <textarea class="form-control" id="prod-full-en" rows="3"></textarea>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" onclick="saveProduct()">Save Product</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="admin-auth.js"></script>

    <!-- Page Logic -->
    <script>
        let categoriesList = [];
        let productModal;

        document.addEventListener('DOMContentLoaded', async () => {
            productModal = new bootstrap.Modal(document.getElementById('productModal'));
            await loadCategories();
            await loadProducts();
        });

        async function loadCategories() {
            const { data } = await supabase.from('categories').select('*');
            categoriesList = data || [];
            const select = document.getElementById('prod-category');
            select.innerHTML = '<option value="">Select Category</option>';
            categoriesList.forEach(cat => {
                select.innerHTML += `<option value="${cat.id}">${cat.name_en} / ${cat.name_ar}</option>`;
            });
        }

        async function loadProducts() {
            const tbody = document.getElementById('products-table-body');
            tbody.innerHTML = '<tr><td colspan="6" class="text-center">Loading...</td></tr>';

            const { data: products, error } = await supabase
                .from('products')
                .select(`*, categories (name_en, name_ar)`)
                .order('created_at', { ascending: false });

            if (error) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center text-danger">Error loading products</td></tr>`;
                return;
            }

            if (products.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center text-muted">No products found.</td></tr>`;
                return;
            }

            tbody.innerHTML = products.map(prod => {
                const catName = prod.categories ? prod.categories.name_en : 'N/A';
                const imgUrl = prod.image_url || 'https://via.placeholder.com/50';
                
                return `
                <tr>
                    <td class="ps-4"><img src="${imgUrl}" class="product-thumb" alt="img"></td>
                    <td>
                        <div class="fw-bold">${prod.name_ar}</div>
                        <div class="small text-muted">${prod.name_en}</div>
                    </td>
                    <td>
                        <div>${prod.price} JOD</div>
                        ${prod.discount_price ? `<div class="small text-danger">${prod.discount_price} JOD</div>` : ''}
                    </td>
                    <td>${catName}</td>
                    <td>
                        <span class="badge ${prod.is_active ? 'bg-success' : 'bg-secondary'}">
                            ${prod.is_active ? 'Active' : 'Inactive'}
                        </span>
                    </td>
                    <td class="text-end pe-4">
                        <button class="btn btn-sm btn-outline-primary me-1" onclick="editProduct(${prod.id})"><i class="bi bi-pencil"></i></button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteProduct(${prod.id})"><i class="bi bi-trash"></i></button>
                    </td>
                </tr>`;
            }).join('');
        }

        function prepareAddProduct() {
            document.getElementById('product-form').reset();
            document.getElementById('prod-id').value = '';
            document.getElementById('productModalLabel').textContent = 'Add Product';
        }

        function editProduct(id) {
            // Find product from DOM or refetch (simpler: fetch single)
            supabase.from('products').select('*').eq('id', id).single().then(({ data }) => {
                if (data) {
                    document.getElementById('prod-id').value = data.id;
                    document.getElementById('prod-name-ar').value = data.name_ar;
                    document.getElementById('prod-name-en').value = data.name_en;
                    document.getElementById('prod-slug').value = data.slug;
                    document.getElementById('prod-price').value = data.price;
                    document.getElementById('prod-discount').value = data.discount_price || '';
                    document.getElementById('prod-image').value = data.image_url;
                    document.getElementById('prod-category').value = data.category_id;
                    document.getElementById('prod-active').checked = data.is_active;
                    
                    document.getElementById('prod-short-ar').value = data.short_description_ar;
                    document.getElementById('prod-short-en').value = data.short_description_en;
                    document.getElementById('prod-full-ar').value = data.full_description_ar;
                    document.getElementById('prod-full-en').value = data.full_description_en;

                    document.getElementById('productModalLabel').textContent = 'Edit Product';
                    productModal.show();
                }
            });
        }

        async function saveProduct() {
            const id = document.getElementById('prod-id').value;
            const productData = {
                name_ar: document.getElementById('prod-name-ar').value,
                name_en: document.getElementById('prod-name-en').value,
                slug: document.getElementById('prod-slug').value,
                price: parseFloat(document.getElementById('prod-price').value),
                discount_price: document.getElementById('prod-discount').value ? parseFloat(document.getElementById('prod-discount').value) : null,
                image_url: document.getElementById('prod-image').value,
                category_id: parseInt(document.getElementById('prod-category').value),
                is_active: document.getElementById('prod-active').checked,
                short_description_ar: document.getElementById('prod-short-ar').value,
                short_description_en: document.getElementById('prod-short-en').value,
                full_description_ar: document.getElementById('prod-full-ar').value,
                full_description_en: document.getElementById('prod-full-en').value,
            };

            let error;
            if (id) {
                // Update
                const result = await supabase.from('products').update(productData).eq('id', id);
                error = result.error;
            } else {
                // Insert
                const result = await supabase.from('products').insert([productData]);
                error = result.error;
            }

            if (error) {
                alert('Error saving product: ' + error.message);
            } else {
                productModal.hide();
                loadProducts();
            }
        }

        async function deleteProduct(id) {
            if (confirm('Are you sure you want to delete this product?')) {
                const { error } = await supabase.from('products').delete().eq('id', id);
                if (error) {
                    alert('Error deleting product: ' + error.message);
                } else {
                    loadProducts();
                }
            }
        }

        async function logoutAdmin() {
            await supabase.auth.signOut();
            window.location.href = '../login.html';
        }
    </script>
</body>
</html>
