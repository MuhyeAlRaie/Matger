<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة التصنيفات</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --sidebar-width: 250px; }
        body { background-color: #f4f6f9; }
        #sidebar { width: var(--sidebar-width); height: 100vh; position: fixed; right: 0; background: #343a40; color: #fff; }
        #content { margin-right: var(--sidebar-width); }
        .sidebar-link { color: rgba(255,255,255,0.8); padding: 12px 20px; display: block; text-decoration: none; }
        .sidebar-link:hover, .sidebar-link.active { background: #495057; color: #fff; border-right: 4px solid #0d6efd; }
    </style>
</head>
<body>
    <nav id="sidebar">
        <div class="p-3 border-bottom border-secondary"><h5>Admin Panel</h5></div>
        <ul class="list-unstyled p-2">
            <li><a href="index.html" class="sidebar-link">الرئيسية</a></li>
            <li><a href="products.html" class="sidebar-link">المنتجات</a></li>
            <li><a href="categories.html" class="sidebar-link active">التصنيفات</a></li>
            <li><a href="../index.html" class="sidebar-link">عرض المتجر</a></li>
        </ul>
    </nav>
    <div id="content">
        <nav class="navbar navbar-light bg-white shadow-sm p-3"><button class="btn btn-light"><i class="fas fa-bars"></i></button></nav>
        <div class="container-fluid p-4">
            <button class="btn btn-primary mb-3" onclick="openModal()">إضافة تصنيف</button>
            <div class="card shadow-sm"><div class="card-body p-0">
                <table class="table mb-0"><thead><tr><th>صورة</th><th>الاسم (عربي)</th><th>الاسم (إنجليزي)</th><th>إجراءات</th></tr></thead><tbody id="table-body"></tbody></table>
            </div></div>
        </div>
    </div>

    <div class="modal fade" id="catModal" tabindex="-1">
        <div class="modal-dialog"><div class="modal-content">
            <div class="modal-header"><h5 class="modal-title">تصنيف جديد</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <input type="hidden" id="c-id">
                <input type="text" id="c-name-ar" class="form-control mb-2" placeholder="الاسم (عربي)">
                <input type="text" id="c-name-en" class="form-control mb-2" placeholder="الاسم (إنجليزي)">
                <input type="url" id="c-image" class="form-control" placeholder="رابط الصورة">
            </div>
            <div class="modal-footer"><button class="btn btn-primary" onclick="saveCat()">حفظ</button></div>
        </div></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="admin-auth.js"></script>
    <script>
        let catModal = new bootstrap.Modal(document.getElementById('catModal'));
        async function load() {
            const { data } = await supabase.from('categories').select('*');
            document.getElementById('table-body').innerHTML = data.map(c => `
                <tr><td><img src="${c.image_url}" width="50"></td><td>${c.name_ar}</td><td>${c.name_en}</td>
                <td><button class="btn btn-sm btn-outline-primary" onclick='edit(${JSON.stringify(c)})'>تعديل</button> <button class="btn btn-sm btn-outline-danger" onclick="del(${c.id})">حذف</button></td></tr>`).join('');
        }
        function openModal() { document.getElementById('c-id').value=''; document.getElementById('c-name-ar').value=''; document.getElementById('c-name-en').value=''; document.getElementById('c-image').value=''; catModal.show(); }
        function edit(c) { document.getElementById('c-id').value=c.id; document.getElementById('c-name-ar').value=c.name_ar; document.getElementById('c-name-en').value=c.name_en; document.getElementById('c-image').value=c.image_url; catModal.show(); }
        async function saveCat() {
            const id = document.getElementById('c-id').value;
            const obj = { name_ar: document.getElementById('c-name-ar').value, name_en: document.getElementById('c-name-en').value, image_url: document.getElementById('c-image').value };
            if(id) await supabase.from('categories').update(obj).eq('id', id);
            else await supabase.from('categories').insert([obj]);
            catModal.hide(); load();
        }
        async function del(id) { if(confirm('حذف؟')) { await supabase.from('categories').delete().eq('id', id); load(); } }
        load();
    </script>
</body>
</html>
