<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Categories</title>
    
    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background-color: #212529; color: white; }
        .sidebar .nav-link { color: #adb5bd; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background-color: #343a40; color: white; }
        .cat-thumb { width: 50px; height: 50px; object-fit: cover; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="container-fluid">
        <div class="row">
            
            <!-- Sidebar -->
            <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse p-3">
                <h4 class="text-center mb-4 text-white">Admin Panel</h4>
                <ul class="nav flex-column">
                    <li class="nav-item mb-2"><a class="nav-link" href="index.html"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a></li>
                    <li class="nav-item mb-2"><a class="nav-link" href="products.html"><i class="bi bi-box-seam me-2"></i> Products</a></li>
                    <li class="nav-item mb-2"><a class="nav-link active" href="categories.html"><i class="bi bi-tags me-2"></i> Categories</a></li>
                    <li class="nav-item mb-2"><a class="nav-link" href="orders.html"><i class="bi bi-receipt me-2"></i> Orders</a></li>
                    <li class="nav-item mb-2"><a class="nav-link" href="banners.html"><i class="bi bi-images me-2"></i> Banners</a></li>
                    <li class="nav-item mb-2"><a class="nav-link" href="coupons.html"><i class="bi bi-percent me-2"></i> Coupons</a></li>
                    <li class="nav-item mb-2"><a class="nav-link" href="regions.html"><i class="bi bi-geo-alt me-2"></i> Regions</a></li>
                    <li class="nav-item mb-2">
    <a class="nav-link" href="notifications.html"><i class="bi bi-megaphone me-2"></i> Notifications</a>
</li>
                    <li class="nav-item mt-4"><hr><a class="nav-link text-danger" href="#" onclick="logoutAdmin()"><i class="bi bi-box-arrow-right me-2"></i> Logout</a></li>
                </ul>
            </nav>

            <!-- Main Content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
                
                <!-- Header -->
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">Categories</h1>
                    <div class="btn-toolbar mb-2 mb-md-0">
                        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#categoryModal" onclick="prepareAddCategory()">
                            <i class="bi bi-plus-lg me-1"></i> Add Category
                        </button>
                    </div>
                </div>

                <!-- Categories Table -->
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th class="ps-4">Image</th>
                                        <th>Name (Arabic)</th>
                                        <th>Name (English)</th>
                                        <th>Slug</th>
                                        <th class="text-end pe-4">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="categories-table-body">
                                    <!-- Populated by JS -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <!-- Category Modal (Add/Edit) -->
    <div class="modal fade" id="categoryModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="categoryModalLabel">Add Category</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="category-form">
                        <input type="hidden" id="cat-id">
                        
                        <div class="mb-3">
                            <label class="form-label">Name (Arabic)</label>
                            <input type="text" class="form-control" id="cat-name-ar" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Name (English)</label>
                            <input type="text" class="form-control" id="cat-name-en" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Slug (URL Identifier)</label>
                            <input type="text" class="form-control" id="cat-slug" required placeholder="e.g. kitchen-tools">
                            <div class="form-text">Must be unique.</div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Image URL</label>
                            <input type="text" class="form-control" id="cat-image" placeholder="/images/categories/filename.jpg">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" onclick="saveCategory()">Save Category</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="admin-auth.js"></script>

    <!-- Page Logic -->
    <script>
        let categoryModal;

        document.addEventListener('DOMContentLoaded', async () => {
            categoryModal = new bootstrap.Modal(document.getElementById('categoryModal'));
            await loadCategories();
        });

        async function loadCategories() {
            const tbody = document.getElementById('categories-table-body');
            tbody.innerHTML = '<tr><td colspan="5" class="text-center">Loading...</td></tr>';

            const { data: categories, error } = await supabase
                .from('categories')
                .select('*')
                .order('created_at', { ascending: true });

            if (error) {
                tbody.innerHTML = `<tr><td colspan="5" class="text-center text-danger">Error loading categories</td></tr>`;
                return;
            }

            if (categories.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="text-center text-muted">No categories found.</td></tr>`;
                return;
            }

            tbody.innerHTML = categories.map(cat => {
                const imgUrl = cat.image_url || 'https://via.placeholder.com/50';
                return `
                <tr>
                    <td class="ps-4"><img src="${imgUrl}" class="cat-thumb" alt="img"></td>
                    <td class="fw-bold">${cat.name_ar}</td>
                    <td>${cat.name_en}</td>
                    <td><code>${cat.slug}</code></td>
                    <td class="text-end pe-4">
                        <button class="btn btn-sm btn-outline-primary me-1" onclick="editCategory(${cat.id})"><i class="bi bi-pencil"></i></button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteCategory(${cat.id})"><i class="bi bi-trash"></i></button>
                    </td>
                </tr>`;
            }).join('');
        }

        function prepareAddCategory() {
            document.getElementById('category-form').reset();
            document.getElementById('cat-id').value = '';
            document.getElementById('categoryModalLabel').textContent = 'Add Category';
        }

        function editCategory(id) {
            supabase.from('categories').select('*').eq('id', id).single().then(({ data }) => {
                if (data) {
                    document.getElementById('cat-id').value = data.id;
                    document.getElementById('cat-name-ar').value = data.name_ar;
                    document.getElementById('cat-name-en').value = data.name_en;
                    document.getElementById('cat-slug').value = data.slug;
                    document.getElementById('cat-image').value = data.image_url || '';

                    document.getElementById('categoryModalLabel').textContent = 'Edit Category';
                    categoryModal.show();
                }
            });
        }

        async function saveCategory() {
            const id = document.getElementById('cat-id').value;
            const categoryData = {
                name_ar: document.getElementById('cat-name-ar').value,
                name_en: document.getElementById('cat-name-en').value,
                slug: document.getElementById('cat-slug').value,
                image_url: document.getElementById('cat-image').value
            };

            let error;
            if (id) {
                // Update
                const result = await supabase.from('categories').update(categoryData).eq('id', id);
                error = result.error;
            } else {
                // Insert
                const result = await supabase.from('categories').insert([categoryData]);
                error = result.error;
            }

            if (error) {
                alert('Error saving category: ' + error.message);
            } else {
                categoryModal.hide();
                loadCategories();
            }
        }

        async function deleteCategory(id) {
            if (confirm('Are you sure you want to delete this category? This might affect products assigned to it.')) {
                const { error } = await supabase.from('categories').delete().eq('id', id);
                if (error) {
                    alert('Error deleting category: ' + error.message);
                } else {
                    loadCategories();
                }
            }
        }

        async function logoutAdmin() {
            await supabase.auth.signOut();
            window.location.href = '../login.html';
        }
    </script>
</body>
</html>
