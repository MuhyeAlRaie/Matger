<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل المنتج | Product Details</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="bi bi-shop-window me-2"></i> <span data-i18n="store_name">متجري</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="index.html" data-i18n="nav_home">الرئيسية</a></li>
                    <li class="nav-item"><a class="nav-link" href="category.html" data-i18n="nav_categories">الأقسام</a></li>
                </ul>
                <div class="d-flex align-items-center gap-3">
                    <button id="lang-toggle" class="btn btn-sm btn-outline-light">English</button>
                    <div id="auth-buttons"></div>
                    <a href="cart.html" class="btn btn-sm btn-warning position-relative">
                        <i class="bi bi-cart3"></i>
                        <span id="cart-count" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Breadcrumb -->
    <div class="bg-light py-2 mb-4">
        <div class="container">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item"><a href="index.html" class="text-decoration-none">Home</a></li>
                    <li class="breadcrumb-item"><a href="category.html" class="text-decoration-none" id="breadcrumb-category">Category</a></li>
                    <li class="breadcrumb-item active" aria-current="page" id="breadcrumb-product">Product</li>
                </ol>
            </nav>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container mb-5">
        
        <!-- Loading State -->
        <div id="product-loading" class="text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
        </div>

        <!-- Product Details (Hidden initially) -->
        <div id="product-content" class="d-none">
            <div class="row">
                <!-- Images -->
                <div class="col-lg-6 mb-4">
                    <div class="border rounded p-3 bg-white">
                        <img id="product-img" src="" alt="Product" class="img-fluid w-100 rounded" style="max-height: 500px; object-fit: contain;">
                    </div>
                </div>

                <!-- Info -->
                <div class="col-lg-6">
                    <span class="badge bg-secondary mb-2" id="product-category-badge">Category</span>
                    <h1 class="mb-3" id="product-title">Product Title</h1>
                    
                    <div class="mb-4">
                        <span id="product-price" class="h2 text-primary fw-bold"></span>
                        <span id="product-old-price" class="h4 text-muted text-decoration-none ms-2 d-none"></span>
                    </div>

                    <div class="mb-4">
                        <h5 class="text-muted" data-i18n="description">Description</h5>
                        <p id="product-description" class="lead text-secondary"></p>
                    </div>

                    <div class="d-grid gap-2 col-lg-8">
                        <button id="add-to-cart-btn" class="btn btn-primary btn-lg py-3">
                            <i class="bi bi-cart-plus me-2"></i> <span data-i18n="add_to_cart">أضف للسلة</span>
                        </button>
                    </div>
                    
                    <ul class="list-unstyled mt-4 small text-muted">
                        <li class="mb-1"><i class="bi bi-truck me-2"></i> <span data-i18n="location">الأردن</span> Delivery</li>
                        <li><i class="bi bi-shield-check me-2"></i> <span data-i18n="guarantee">ضمان الجودة</span></li>
                    </ul>
                </div>
            </div>
        </div>

        <!-- 404 State -->
        <div id="product-not-found" class="text-center py-5 d-none">
            <h2 class="text-muted">Product Not Found</h2>
            <a href="index.html" class="btn btn-primary mt-3">Back Home</a>
        </div>

        <hr class="my-5">

        <!-- Related Products -->
        <section id="related-section">
            <h3 class="mb-4 section-title" data-i18n="related_products">منتجات ذات صلة</h3>
            <div id="related-grid" class="row g-4">
                <!-- Injected via JS -->
            </div>
        </section>

    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4 mt-auto">
        <div class="container text-center">
            <p class="mb-0">&copy; 2023 <span data-i18n="store_name">متجري</span>. All Rights Reserved.</p>
        </div>
    </footer>

    <!-- Toast Container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toast-container"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="js/supabase-config.js"></script>
    <script src="js/app.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/auth.js"></script>

    <!-- Page Specific Script -->
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const slug = params.get('slug');

            if (!slug) {
                window.location.href = 'index.html';
                return;
            }

            await loadProduct(slug);
        });

        async function loadProduct(slug) {
            const loading = document.getElementById('product-loading');
            const content = document.getElementById('product-content');
            const notFound = document.getElementById('product-not-found');

            try {
                // Fetch Product with Category Info
                const { data: product, error } = await supabase
                    .from('products')
                    .select(`*, categories (id, slug, name_ar, name_en)`)
                    .eq('slug', slug)
                    .eq('is_active', true)
                    .single();

                if (error || !product) throw error;

                // Update UI
                loading.classList.add('d-none');
                content.classList.remove('d-none');

                // 1. Text Content
                const title = currentLang === 'ar' ? product.name_ar : product.name_en;
                const desc = currentLang === 'ar' ? product.full_description_ar : product.full_description_en;
                const catName = currentLang === 'ar' ? product.categories.name_ar : product.categories.name_en;

                document.title = `${title} | ${i18n[currentLang].store_name}`;
                document.getElementById('product-title').textContent = title;
                document.getElementById('product-description').innerHTML = desc || ''; // Allow HTML in desc
                document.getElementById('product-category-badge').textContent = catName;
                
                // Breadcrumbs
                document.getElementById('breadcrumb-category').textContent = catName;
                document.getElementById('breadcrumb-category').href = `category.html?slug=${product.categories.slug}`;
                document.getElementById('breadcrumb-product').textContent = title;

                // 2. Images
                const imgUrl = product.image_url || 'https://via.placeholder.com/600';
                document.getElementById('product-img').src = imgUrl;

                // 3. Price
                const hasDiscount = product.discount_price && product.discount_price < product.price;
                const finalPrice = hasDiscount ? product.discount_price : product.price;

                document.getElementById('product-price').textContent = formatPrice(finalPrice);
                
                const oldPriceEl = document.getElementById('product-old-price');
                if (hasDiscount) {
                    oldPriceEl.textContent = formatPrice(product.price);
                    oldPriceEl.classList.remove('d-none');
                } else {
                    oldPriceEl.classList.add('d-none');
                }

                // 4. Add to Cart Logic
                const btn = document.getElementById('add-to-cart-btn');
                btn.onclick = () => addToCart(product.id);

                // 5. Load Related Products
                loadRelatedProducts(product.categories.id, product.id);

                // 6. Update Meta Description
                document.querySelector('meta[name="description"]').setAttribute("content", desc.substring(0, 150));

            } catch (err) {
                console.error(err);
                loading.classList.add('d-none');
                notFound.classList.remove('d-none');
            }
        }

        async function loadRelatedProducts(catId, currentProdId) {
            const grid = document.getElementById('related-grid');
            try {
                const { data: products } = await supabase
                    .from('products')
                    .select('*')
                    .eq('category_id', catId)
                    .neq('id', currentProdId) // Exclude current product
                    .eq('is_active', true)
                    .limit(4);

                if (!products || products.length === 0) {
                    document.getElementById('related-section').style.display = 'none';
                    return;
                }

                products.forEach(prod => {
                    const title = currentLang === 'ar' ? prod.name_ar : prod.name_en;
                    const price = prod.discount_price < prod.price ? prod.discount_price : prod.price;
                    const imgUrl = prod.image_url || 'https://via.placeholder.com/300';
                    const hasDiscount = prod.discount_price && prod.discount_price < prod.price;

                    grid.innerHTML += `
                    <div class="col-6 col-md-3">
                        <div class="product-card h-100">
                            <a href="product.html?slug=${prod.slug}" class="text-decoration-none text-dark">
                                <div class="product-image-wrapper">
                                    <img src="${imgUrl}" alt="${title}" loading="lazy">
                                    ${hasDiscount ? `<span class="discount-badge">SALE</span>` : ''}
                                </div>
                                <div class="card-body">
                                    <h5 class="product-title">${title}</h5>
                                    <div class="product-price">
                                        ${hasDiscount ? `<span class="old-price">${prod.price}</span>` : ''}
                                        ${price} JOD
                                    </div>
                                    <button onclick="addToCart(${prod.id})" class="btn btn-primary w-100 mt-3 btn-sm">Add to Cart</button>
                                </div>
                            </a>
                        </div>
                    </div>`;
                });
            } catch (e) { console.error(e); }
        }
    </script>
    <script src="js/push-receiver.js"></script>
</body>
</html>
