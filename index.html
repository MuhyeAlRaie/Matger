<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Dynamic SEO Meta Tags (Will be updated by JS) -->
    <title>متجر إلكتروني متعدد الأقسام | Multi-Category Store</title>
    <meta name="description" content="أفضل المنتجات بأسعار منافسة. Best products at competitive prices.">
    <meta name="keywords" content="تسوق, منتجات, تخفيضات, shop, products, sale">
    <meta name="author" content="Store Name">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://yourusername.github.io/">
    <meta property="og:title" content="متجر إلكتروني متعدد الأقسام">
    <meta property="og:description" content="تسوق الآن أحدث المنتجات.">
    <meta property="og:image" content="https://yourusername.github.io/images/banners/default-og.jpg">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://yourusername.github.io/">
    <meta property="twitter:title" content="متجر إلكتروني متعدد الأقسام">
    <meta property="twitter:description" content="تسوق الآن أحدث المنتجات.">
    <meta property="twitter:image" content="https://yourusername.github.io/images/banners/default-og.jpg">

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d6efd">
    
    <!-- Bootstrap 5.3 RTL CSS (Default) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Structured Data Placeholder -->
    <script type="application/ld+json" id="structured-data">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Store Name",
      "url": "https://yourusername.github.io/Matger"
    }
    </script>
</head>
<body>

    <!-- Navigation -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
    <div class="container">
        <!-- Brand (Left) -->
        <a class="navbar-brand" href="index.html">
            <i class="bi bi-shop-window me-2"></i> <span data-i18n="store_name">متجري</span>
        </a>
        
        <!-- Right Side: Cart (Always Visible) & Menu Toggle -->
        <div class="d-flex align-items-center gap-3">
            <!-- Cart Button (Moved Here) -->
            <a href="cart.html" class="btn btn-sm btn-warning position-relative">
                <i class="bi bi-cart3"></i>
                <span id="cart-count" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
            </a>

            <!-- Mobile Menu Button -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>

        <!-- Collapsible Menu (Links, Language, Auth) -->
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" href="index.html" data-i18n="nav_home">الرئيسية</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="category.html" data-i18n="nav_categories">الأقسام</a>
                </li>
            </ul>
            
            <div class="d-flex align-items-center gap-3">
                <!-- Language Switcher -->
                <button id="lang-toggle" class="btn btn-sm btn-outline-light">English</button>
                
                <!-- Search (Optional - keeping it inside menu for cleanliness, or move out if preferred) -->
                <form class="d-none d-md-flex" role="search">
                    <div class="input-group input-group-sm">
                        <input class="form-control" type="search" id="search-input" placeholder="بحث..." aria-label="Search">
                        <button class="btn btn-outline-light" type="button"><i class="bi bi-search"></i></button>
                    </div>
                </form>

                <!-- Auth Buttons -->
                <div id="auth-buttons" class="d-flex gap-2">
                    <!-- Injected by JS -->
                    <a href="login.html" class="btn btn-sm btn-light"><i class="bi bi-person"></i></a>
                </div>
            </div>
        </div>
    </div>
</nav>

    <!-- Main Content -->
    <main>
        <!-- Banner Slider Section -->
        <section id="banner-section" class="mb-5">
            <!-- Content injected by app.js from Supabase -->
            <div class="placeholder-glow">
                <div class="p-5 mb-4 bg-light rounded-3 placeholder-wave" style="height: 400px;"></div>
            </div>
        </section>

        <div class="container">
            <!-- Categories Section -->
            <section id="categories-section" class="mb-5">
                <h2 class="section-title mb-4" data-i18n="categories">الأقسام</h2>
                <div id="categories-container" class="row g-3">
                    <!-- Category Cards injected by products.js -->
                </div>
            </section>

            <!-- Featured Products Section -->
            <section id="featured-section" class="mb-5">
                <h2 class="section-title mb-4" data-i18n="featured_products">منتجات مميزة</h2>
                <div id="products-container" class="row g-4">
                    <!-- Product Cards injected by products.js -->
                    <!-- Loading Placeholder -->
                    <div class="col-12 text-center py-5">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4 mt-auto">
        <div class="container">
            <div class="row">
                <div class="col-md-4 mb-3">
                    <h5 data-i18n="footer_about">عن المتجر</h5>
                    <p class="small text-muted" data-i18n="footer_desc">نقدم أفضل المنتجات بأفضل الأسعار مع خدمة توصيل سريعة.</p>
                </div>
                <div class="col-md-4 mb-3">
                    <h5 data-i18n="footer_links">روابط سريعة</h5>
                    <ul class="list-unstyled">
                        <li><a href="account.html" class="text-white text-decoration-none" data-i18n="nav_account">حسابي</a></li>
                        <li><a href="cart.html" class="text-white text-decoration-none" data-i18n="nav_cart">السلة</a></li>
                    </ul>
                </div>
                <div class="col-md-4 mb-3">
                    <h5 data-i18n="footer_contact">تواصل معنا</h5>
                    <p class="small text-muted"><i class="bi bi-geo-alt"></i> <span data-i18n="location">الأردن</span></p>
                    <p class="small text-muted"><i class="bi bi-envelope"></i> info@store.com</p>
                </div>
            </div>
            <hr>
            <div class="text-center small text-muted">
                &copy; 2023 <span data-i18n="store_name">متجري</span>. All Rights Reserved.
            </div>
        </div>
    </footer>

    <!-- Toast Container for Notifications -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toast-container" style="z-index: 1100"></div>

    <!-- Scripts -->
    <!-- Supabase Client (CDN for development ease, usually bundled in prod) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    
    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Application Logic -->
    <script src="js/supabase-config.js"></script>
    <script src="js/app.js"></script>
    <script src="js/products.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/pwa-installer.js"></script>
    <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js')
        .then(reg => console.log('Service Worker: Registered'))
        .catch(err => console.log('Service Worker: Error: ' + err));
    });
  }
</script>
<script src="js/push-receiver.js"></script>
</body>
</html>
