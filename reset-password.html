<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | إعادة تعيين كلمة المرور</title>
    
    <!-- Bootstrap 5.3 RTL CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <!-- Custom Modern CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- NAVIGATION -->
    <nav class="navbar navbar-expand-lg navbar-light sticky-top">
        <div class="container">
           <a class="navbar-brand" href="index.html">
    <!-- Update 'src' to your actual logo file path -->
    <img src="images/loomi-logo.png" alt="Store Logo" class="brand-logo">
</a>

        </div>
    </nav>

    <!-- MAIN CONTENT -->
    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                
                <!-- Card -->
                <div class="card shadow-lg rounded-4 border-0">
                    <div class="card-body p-5">
                        
                        <!-- Icon & Header -->
                        <div class="text-center mb-5">
                            <div class="mb-3">
                                <i class="bi bi-shield-lock-fill display-1 text-primary"></i>
                            </div>
                            <h3 class="fw-bold text-dark mb-1">Set New Password</h3>
                            <p class="text-muted small">Please enter your new password below.</p>
                        </div>

                        <!-- Error/Success Alert -->
                        <div id="reset-msg" class="alert d-none rounded-3 border-0" role="alert"></div>

                        <!-- Reset Form -->
                        <form id="reset-form">
                            <div class="mb-3">
                                <label class="form-label small text-muted fw-bold text-uppercase">New Password</label>
                                <div class="input-group input-group-lg">
                                    <span class="input-group-text bg-light border-end-0">
                                        <i class="bi bi-key text-muted"></i>
                                    </span>
                                    <input type="password" class="form-control border-start-0 ps-0" id="new-password" placeholder="Min 6 characters" required minlength="6">
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label small text-muted fw-bold text-uppercase">Confirm New Password</label>
                                <div class="input-group input-group-lg">
                                    <span class="input-group-text bg-light border-end-0">
                                        <i class="bi bi-check2-all text-muted"></i>
                                    </span>
                                    <input type="password" class="form-control border-start-0 ps-0" id="confirm-password" placeholder="Confirm password" required minlength="6">
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary btn-lg w-100 py-3 rounded-pill shadow fw-bold">
                                Update Password
                            </button>
                        </form>

                    </div>
                </div>

            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="bg-white border-top mt-5 py-5">
        <div class="container text-center">
            <p class="mb-0 text-muted small">&copy; 2026 متجري. All Rights Reserved.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/supabase-config.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const msgDiv = document.getElementById('reset-msg');
            const form = document.getElementById('reset-form');
            const hash = window.location.hash;

            // 1. Check if the URL contains the recovery token
            if (hash.includes('type=recovery') || hash.includes('access_token')) {
                
                // 2. Supabase SDK automatically parses the hash and sets the session
                const { data: { session }, error } = await supabase.auth.getSession();

                if (error || !session) {
                    msgDiv.textContent = "Invalid or expired reset link. Please try again.";
                    msgDiv.className = "alert alert-danger d-block";
                    form.style.display = 'none';
                } else {
                    // Session is valid, enable form logic
                    msgDiv.textContent = "Valid reset link. Please enter your new password.";
                    msgDiv.className = "alert alert-success d-block";
                }
            } else {
                msgDiv.textContent = "No reset token found. Please request a password reset from the login page.";
                msgDiv.className = "alert alert-warning d-block";
                form.style.display = 'none';
            }

            // 3. Handle Form Submit
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const newPass = document.getElementById('new-password').value;
                const confirmPass = document.getElementById('confirm-password').value;

                if (newPass !== confirmPass) {
                    msgDiv.textContent = "Passwords do not match.";
                    msgDiv.className = "alert alert-danger d-block";
                    return;
                }

                const btn = form.querySelector('button');
                const originalText = btn.innerHTML;
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Updating...';

                try {
                    // Update the user's password
                    const { error } = await supabase.auth.updateUser({
                        password: newPass
                    });

                    if (error) throw error;

                    msgDiv.textContent = "Password updated successfully! Redirecting to login...";
                    msgDiv.className = "alert alert-success d-block";
                    form.style.display = 'none';

                    // Redirect to login after 2 seconds
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);

                } catch (err) {
                    msgDiv.textContent = "Error updating password: " + err.message;
                    msgDiv.className = "alert alert-danger d-block";
                    btn.disabled = false;
                    btn.innerHTML = originalText;
                }
            });
        });
    </script>
</body>
</html>
