<a class="navbar-brand" href="index.html">

            <div class="d-flex align-items-center gap-3 order-lg-3">

                </a>
                <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                    <span class="navbar-toggler-icon"></span>
                </button>

                    <li class="nav-item"><a class="nav-link" href="category.html" data-i18n="nav_categories">الأقسام</a></li>
                    <li class="nav-item"><a class="nav-link" href="account.html" data-i18n="nav_account">حسابي</a></li>
                </ul>
                
                <div class="d-flex align-items-center gap-3">
                    <button id="lang-toggle" class="btn btn-outline-primary rounded-pill btn-sm">English</button>

                    </div>
                </div>
            </div>
        </div>

    <!-- =========================================
         MAIN CART CONTENT
         ========================================= -->
    <main class="container my-5">
        
        <!-- Breadcrumb -->
        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb small">
                <li class="breadcrumb-item"><a href="index.html" class="text-muted text-decoration-none">Home</a></li>
                <li class="breadcrumb-item active text-primary" aria-current="page">Cart</li>
            </ol>
        </nav>

        <h1 class="fw-bold mb-5">Your Shopping Cart</h1>

        <div class="row">
            
            <!-- LEFT COLUMN: Cart Items List -->
            <div class="col-lg-8">
                
                <!-- Empty Cart Message -->
                <div id="empty-cart-msg" class="text-center py-5 bg-white rounded-4 shadow-sm d-none">
                    <div class="mb-3">
                        <i class="bi bi-cart-x display-1 text-muted"></i>
                    </div>
                    <h3 class="text-muted">Your cart is empty</h3>
                    <p class="text-muted mb-4">Looks like you haven't added anything to your cart yet.</p>
                    <a href="index.html" class="btn btn-primary rounded-pill px-4">
                        <i class="bi bi-arrow-right-short"></i> Start Shopping
                    </a>
                </div>

                <!-- Cart Items Container (List Group Style) -->
                <div id="cart-items-container" class="list-group list-group-flush gap-3">
                    <!-- Items injected by JS (cart.js) -->
                    <!-- Example Item Structure for Reference:
                    <div class="list-group-item border-0 bg-white rounded-3 shadow-sm p-3 d-flex align-items-center">
                        <img src="..." class="rounded-3" style="width:80px;height:80px;object-fit:cover;">
                        <div class="flex-grow-1">
                            <h5 class="mb-1">Product Name</h5>
                            <div class="d-flex justify-content-between align-items-center">
                                <div class="d-flex align-items-center gap-2">
                                    <button class="btn btn-sm btn-light rounded-circle">-</button>
                                    <span class="fw-bold">1</span>
                                    <button class="btn btn-sm btn-light rounded-circle">+</button>
                                </div>
                                <span class="fw-bold text-primary h5 mb-0">Price</span>
                            </div>
                        </div>
                        <button class="btn btn-link text-danger"><i class="bi bi-trash3"></i></button>
                    </div>
                    -->
                </div>

            </div>

            <!-- RIGHT COLUMN: Order Summary (Sticky) -->
            <div class="col-lg-4">
                <div class="card border-0 shadow-lg rounded-4 p-4 sticky-top" style="top: 100px; z-index: 10;">
                    <h4 class="fw-bold mb-4">Order Summary</h4>
                    
                    <!-- Coupon Section -->
                    <div class="mb-4">
                        <label class="form-label small text-muted fw-bold text-uppercase">Have a coupon?</label>
                        <div class="input-group input-group-sm">
                            <input type="text" id="coupon-code" class="form-control" placeholder="Enter code">
                            <button class="btn btn-outline-primary rounded-end" type="button" onclick="applyCoupon()">Apply</button>
                        </div>
                        <div id="coupon-message" class="form-text"></div>
                    </div>
                    
                    <hr class="border-secondary">
                    
                    <!-- Totals -->
                    <div id="summary-body">
                        <!-- Injected by cart.js -->
                        <!-- Structure:
                        <div class="d-flex justify-content-between mb-2"><span>Subtotal</span><span>0.00</span></div>
                        <div class="d-flex justify-content-between mb-2 text-success"><span>Discount</span><span>-0.00</span></div>
                        <hr>
                        <div class="d-flex justify-content-between mb-4 align-items-center">
                            <span class="fw-bold text-dark">Total</span>
                            <span class="h4 fw-bold text-primary mb-0">0.00</span>
                        </div>
                        <a href="checkout.html" class="btn btn-primary w-100 py-3 rounded-pill shadow">
                            Checkout <i class="bi bi-arrow-left-short me-1"></i>
                        </a>

                        <a href="index.html" class="text-decoration-none text-muted small hover-primary">
