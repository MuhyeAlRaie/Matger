<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سلة التسوق | Shopping Cart</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="bi bi-shop-window me-2"></i> <span data-i18n="store_name">متجري</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="index.html" data-i18n="nav_home">الرئيسية</a></li>
                    <li class="nav-item"><a class="nav-link" href="category.html" data-i18n="nav_categories">الأقسام</a></li>
                </ul>
                <div class="d-flex align-items-center gap-3">
                    <button id="lang-toggle" class="btn btn-sm btn-outline-light">English</button>
                    <div id="auth-buttons"></div>
                    <a href="cart.html" class="btn btn-sm btn-warning position-relative">
                        <i class="bi bi-cart3"></i>
                        <span id="cart-count" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container my-5">
        <h2 class="mb-4 border-bottom pb-2"><i class="bi bi-cart3 me-2"></i> <span data-i18n="nav_cart">السلة</span></h2>
        
        <div class="row">
            <!-- Cart Items Column -->
            <div class="col-lg-8">
                
                <!-- Empty Cart Message -->
                <div id="empty-cart-msg" class="text-center py-5 d-none">
                    <i class="bi bi-cart-x display-1 text-muted"></i>
                    <h3 class="mt-3">Your cart is empty</h3>
                    <p class="text-muted">Looks like you haven't added anything to your cart yet.</p>
                    <a href="index.html" class="btn btn-primary mt-2">Start Shopping</a>
                </div>

                <!-- Cart Items List -->
                <div id="cart-items-container">
                    <!-- Items injected by js/cart.js -->
                </div>

            </div>

            <!-- Order Summary Column -->
            <div class="col-lg-4">
                <div class="card order-summary-card sticky-top" style="top: 100px;">
                    <h4 class="card-title mb-4">Order Summary</h4>
                    
                    <!-- Coupon Section -->
                    <div class="mb-4">
                        <label class="form-label small text-muted">Coupon Code</label>
                        <div class="input-group">
                            <input type="text" id="coupon-code" class="form-control" placeholder="Enter code">
                            <button class="btn btn-outline-secondary" type="button" onclick="applyCoupon()">Apply</button>
                        </div>
                        <div id="coupon-message" class="form-text"></div>
                    </div>

                    <hr>
                    
                    <!-- Totals -->
                    <div id="summary-body">
                        <!-- Injected by js/cart.js -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4 mt-auto">
        <div class="container text-center">
            <p class="mb-0">&copy; 2023 <span data-i18n="store_name">متجري</span>. All Rights Reserved.</p>
        </div>
    </footer>

    <!-- Toast Container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toast-container"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="js/supabase-config.js"></script>
    <script src="js/app.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/auth.js"></script>
    
    <!-- Inline Script to ensure cart renders immediately -->
    <script>
        // renderCartPage is called inside cart.js on DOMContentLoaded
        // This page is strictly dependent on cart.js logic.
    </script>
    <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js')
        .then(reg => console.log('Service Worker: Registered'))
        .catch(err => console.log('Service Worker: Error: ' + err));
    });
  }
</script>
<script src="js/push-receiver.js"></script>
</body>
</html>
