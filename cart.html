<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سلة التسوق | Shopping Cart</title>
    <meta name="description" content="راجع المنتجات في سلتك وأكمل عملية الشراء.">
    
    <!-- Bootstrap 5.3 RTL -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <!-- NAVBAR (Same as Index) -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-store me-2"></i> <span data-i18n="store_name">متجري</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarContent">
                <form class="d-flex mx-auto my-2 my-lg-0" role="search" action="search.html" method="GET">
                    <div class="input-group">
                        <input class="form-control" type="search" name="q" placeholder="بحث..." aria-label="Search">
                        <button class="btn btn-outline-light" type="submit"><i class="fas fa-search"></i></button>
                    </div>
                </form>

                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center">
                    <li class="nav-item">
                        <a class="nav-link active" href="cart.html">
                            <i class="fas fa-shopping-cart fa-lg"></i>
                            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="cart-count">0</span>
                        </a>
                    </li>
                    <li class="nav-item" id="auth-links">
                        <!-- Injected via JS -->
                        <a class="nav-link" href="login.html"><i class="fas fa-user"></i> دخول</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- BREADCRUMB -->
    <div class="bg-light py-2 mb-4">
        <div class="container">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item"><a href="index.html" class="text-decoration-none">الرئيسية</a></li>
                    <li class="breadcrumb-item active" aria-current="page">السلة</li>
                </ol>
            </nav>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <main class="container mb-5">
        <h2 class="mb-4 section-title">سلة التسوق</h2>

        <div class="row">
            <!-- CART ITEMS -->
            <div class="col-lg-8">
                <div class="card shadow-sm mb-4">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-striped mb-0 align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th style="width: 50%">المنتج</th>
                                        <th>الكمية</th>
                                        <th>الإجمالي</th>
                                        <th></th>
                                    </tr>
                                </thead>
                                <tbody id="cart-page-body">
                                    <!-- JS injects rows here -->
                                </tbody>
                            </table>
                        </div>
                        
                        <!-- Empty Cart Message -->
                        <div id="cart-empty-msg" class="text-center py-5 d-none">
                            <i class="fas fa-shopping-basket fa-3x text-muted mb-3"></i>
                            <h4>السلة فارغة</h4>
                            <p class="text-muted">لم تقم بإضافة أي منتجات بعد.</p>
                            <a href="index.html" class="btn btn-primary">تسوق الآن</a>
                        </div>
                    </div>
                </div>

                <!-- COUPON SECTION -->
                <div class="card shadow-sm">
                    <div class="card-body">
                        <div class="input-group">
                            <input type="text" id="coupon-input" class="form-control" placeholder="كود الخصم (مثال: WELCOME10)">
                            <button class="btn btn-secondary" type="button" id="apply-coupon-btn">تطبيق الكوبون</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ORDER SUMMARY -->
            <div class="col-lg-4">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">ملخص الطلب</h5>
                    </div>
                    <div class="card-body">
                        <div class="d-flex justify-content-between mb-2">
                            <span>المجموع الفرعي:</span>
                            <span id="cart-subtotal">0.00 JOD</span>
                        </div>
                        <div class="d-flex justify-content-between mb-2 text-danger">
                            <span>الخصم:</span>
                            <span id="cart-discount">0.00 JOD</span>
                        </div>
                        <hr>
                        <div class="d-flex justify-content-between mb-4 fw-bold fs-5">
                            <span>الإجمالي الكلي:</span>
                            <span id="cart-total">0.00 JOD</span>
                        </div>
                        
                        <a href="checkout.html" id="checkout-btn" class="btn btn-success w-100 py-2 fw-bold" disabled>
                            إتمام الشراء <i class="fas fa-arrow-left ms-2"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="bg-dark text-white pt-5 pb-3">
        <div class="container text-center">
            <small>&copy; 2023 متجري. All Rights Reserved.</small>
        </div>
    </footer>

    <!-- SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/cart.js"></script>
    
    <script>
        // Enable checkout button only if cart has items
        const updateCheckoutButton = () => {
            const count = document.getElementById('cart-count').textContent;
            const btn = document.getElementById('checkout-btn');
            if (parseInt(count) > 0) {
                btn.removeAttribute('disabled');
            } else {
                btn.setAttribute('disabled', 'true');
            }
        };
        // Simple hook into cart update
        const originalSaveCart = window.saveCart;
        window.saveCart = function() {
            originalSaveCart();
            updateCheckoutButton();
        };
        document.addEventListener('DOMContentLoaded', updateCheckoutButton);
    </script>
</body>
</html>
