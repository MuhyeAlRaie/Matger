<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شكراً لك | Thank You</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="bi bi-shop-window me-2"></i> <span data-i18n="store_name">متجري</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="index.html" data-i18n="nav_home">الرئيسية</a></li>
                    <li class="nav-item"><a class="nav-link" href="category.html" data-i18n="nav_categories">الأقسام</a></li>
                </ul>
                <div class="d-flex align-items-center gap-3">
                    <button id="lang-toggle" class="btn btn-sm btn-outline-light">English</button>
                    <div id="auth-buttons"></div>
                    <a href="cart.html" class="btn btn-sm btn-warning position-relative">
                        <i class="bi bi-cart3"></i>
                        <span id="cart-count" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8 text-center">
                
                <div class="mb-4">
                    <i class="bi bi-check-circle-fill text-success display-1"></i>
                </div>

                <h1 class="mb-3">Thank You For Your Order!</h1>
                <h3 class="h4 text-muted mb-4">شكراً لطلبك</h3>

                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-body py-4">
                        <p class="mb-1 fs-5">Order ID: <strong id="display-order-id">#---</strong></p>
                        <p class="text-muted">We have received your order and will process it shortly.</p>
                        <p class="text-muted">لقد استلمنا طلبك وسنقوم بمعالجته قريباً.</p>
                    </div>
                </div>

                <div class="d-flex justify-content-center gap-3">
                    <a href="index.html" class="btn btn-primary px-4 py-2">Continue Shopping</a>
                    <a href="account.html" class="btn btn-outline-secondary px-4 py-2">View Orders</a>
                </div>

            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4 mt-auto">
        <div class="container text-center">
            <p class="mb-0">&copy; 2023 <span data-i18n="store_name">متجري</span>. All Rights Reserved.</p>
        </div>
    </footer>

    <!-- Toast Container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toast-container"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="js/supabase-config.js"></script>
    <script src="js/app.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/auth.js"></script>

    <!-- Page Specific Script -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Get Order ID from URL
            const params = new URLSearchParams(window.location.search);
            const orderId = params.get('id');
            
            if (orderId) {
                document.getElementById('display-order-id').textContent = '#' + orderId;
            } else {
                document.getElementById('display-order-id').textContent = 'Unknown';
            }
        });
    </script>
</body>
</html>
