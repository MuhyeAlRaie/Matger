<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إتمام الطلب | Checkout</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="bi bi-shop-window me-2"></i> <span data-i18n="store_name">متجري</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="index.html" data-i18n="nav_home">الرئيسية</a></li>
                    <li class="nav-item"><a class="nav-link" href="cart.html" data-i18n="nav_cart">السلة</a></li>
                </ul>
                <div class="d-flex align-items-center gap-3">
                    <button id="lang-toggle" class="btn btn-sm btn-outline-light">English</button>
                    <div id="auth-buttons"></div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Breadcrumb -->
    <div class="bg-light py-2 mb-4">
        <div class="container">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item"><a href="index.html" class="text-decoration-none">Home</a></li>
                    <li class="breadcrumb-item"><a href="cart.html" class="text-decoration-none">Cart</a></li>
                    <li class="breadcrumb-item active" aria-current="page">Checkout</li>
                </ol>
            </nav>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container my-5">
        <h2 class="mb-4">Checkout</h2>

        <form id="checkout-form">
            <div class="row">
                
                <!-- Left Column: Shipping Details -->
                <div class="col-lg-7">
                    <div class="card border-0 shadow-sm mb-4">
                        <div class="card-header bg-white fw-bold">
                            <i class="bi bi-geo-alt me-2"></i> Shipping Information
                        </div>
                        <div class="card-body">
                            
                            <!-- User Info -->
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label">Full Name</label>
                                    <input type="text" id="checkout-name" class="form-control" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Phone Number</label>
                                    <input type="tel" id="checkout-phone" class="form-control" placeholder="079xxxxxxx" required>
                                </div>
                            </div>

                            <hr class="my-4">

                            <!-- Address -->
                            <div class="mb-3">
                                <label class="form-label d-flex justify-content-between">
                                    <span>Delivery Address</span>
                                    <button type="button" id="detect-location-btn" class="btn btn-sm btn-outline-primary py-0">
                                        <i class="bi bi-geo-alt-fill"></i> Detect My Location
                                    </button>
                                </label>
                                <textarea id="checkout-address" class="form-control" rows="3" required placeholder="Enter full address..."></textarea>
                                <div class="form-text">We will deliver to this address.</div>
                            </div>

                            <hr class="my-4">

                            <!-- Delivery Region -->
                            <div class="mb-3">
                                <label class="form-label">Delivery Region</label>
                                <select id="delivery-region" class="form-select" required>
                                    <option value="" selected disabled>Loading regions...</option>
                                    <!-- Regions injected by checkout.js -->
                                </select>
                            </div>

                        </div>
                    </div>
                </div>

                <!-- Right Column: Order Summary -->
                <div class="col-lg-5">
                    <div class="card border-0 shadow-sm">
                        <div class="card-header bg-white fw-bold">
                            <i class="bi bi-receipt me-2"></i> Order Summary
                        </div>
                        <div class="card-body">
                            <!-- Items List -->
                            <div id="checkout-summary-items" class="mb-4" style="max-height: 200px; overflow-y: auto;">
                                <!-- Items injected by checkout.js -->
                            </div>

                            <hr>

                            <!-- Totals -->
                            <div class="d-flex justify-content-between mb-2">
                                <span class="text-muted">Subtotal</span>
                                <span id="checkout-subtotal">0.00 JOD</span>
                            </div>
                            <div class="d-flex justify-content-between mb-2">
                                <span class="text-muted">Shipping</span>
                                <span id="checkout-shipping">0.00 JOD</span>
                            </div>
                            <!-- ADD THIS NEW ROW FOR DISCOUNT -->
<div id="checkout-discount-row" class="d-flex justify-content-between mb-2 text-success d-none">
    <span>Discount (<span id="coupon-type-display"></span>)</span>
    <span id="checkout-discount">-0.00 JOD</span>
</div>
                            <div class="d-flex justify-content-between mb-4">
                                <span class="fw-bold fs-5">Total</span>
                                <span class="fw-bold fs-5 text-primary" id="checkout-total">0.00 JOD</span>
                            </div>

                            <!-- Submit Button -->
                            <button type="submit" id="place-order-btn" class="btn btn-success w-100 py-3 fw-bold">
                                Place Order
                            </button>

                            <div class="text-center mt-3">
                                <a href="cart.html" class="text-decoration-none small text-muted">&larr; Return to Cart</a>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </form>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4 mt-auto">
        <div class="container text-center">
            <p class="mb-0">&copy; 2023 <span data-i18n="store_name">متجري</span>. All Rights Reserved.</p>
        </div>
    </footer>

    <!-- Toast Container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toast-container"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="js/supabase-config.js"></script>
    <script src="js/app.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/checkout.js"></script>
</body>
</html>
