<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إتمام الطلب | Checkout</title>
    
    <!-- Bootstrap 5.3 RTL CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <!-- Custom Modern CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- =========================================
         MODERN NAVIGATION
         ========================================= -->
    <nav class="navbar navbar-expand-lg navbar-light sticky-top">
        <div class="container">
            <!-- Brand -->
<a class="navbar-brand" href="index.html">
    <!-- Update 'src' to your actual logo file path -->
    <img src="images/loomi-logo.png" alt="Store Logo" class="brand-logo">
</a>

            <div class="d-flex align-items-center gap-3 order-lg-3">
                <a href="cart.html" class="btn rounded-pill position-relative btn-sm">
                    <i class="bi bi-cart3"></i>
                    <span id="cart-count" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
                </a>
                <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
            </div>

            <div class="collapse navbar-collapse order-lg-2" id="mainNav">
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link fw-bold" href="index.html" data-i18n="nav_home">الرئيسية</a></li>
                    <li class="nav-item"><a class="nav-link" href="cart.html" data-i18n="nav_cart">السلة</a></li>
                </ul>
                
                <div class="d-flex align-items-center gap-3">
                    <button id="lang-toggle" class="btn btn-outline-primary rounded-pill btn-sm">English</button>
                    <div id="auth-buttons">
                        <a href="login.html" class="btn btn-sm btn-light rounded-pill"><i class="bi bi-person-circle"></i></a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- =========================================
         MAIN CONTENT
         ========================================= -->
    <main class="container my-5">
        
        <!-- Breadcrumb -->
        <div class="bg-light py-2 mb-4 rounded-3">
            <div class="container">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-0 justify-content-center">
                        <li class="breadcrumb-item"><a href="index.html" class="text-muted text-decoration-none">Home</a></li>
                        <li class="breadcrumb-item"><a href="cart.html" class="text-muted text-decoration-none">Cart</a></li>
                        <li class="breadcrumb-item active text-primary" aria-current="page">Checkout</li>
                    </ol>
                </nav>
            </div>
        </div>

        <form id="checkout-form">
            <div class="row">
                
                <!-- LEFT COLUMN: Shipping Details Form -->
                <div class="col-lg-7 mb-4">
                    <div class="card border-0 shadow-sm rounded-4 mb-4">
                        <div class="card-header bg-white border-0 py-3 px-4">
                            <h5 class="mb-0 fw-bold text-dark">
                                <i class="bi bi-geo-alt text-primary me-2"></i> Shipping Information
                            </h5>
                        </div>
                        <div class="card-body p-4">
                            
                            <!-- User Info -->
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label small text-muted fw-bold">Full Name</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
                                        <input type="text" id="checkout-name" class="form-control border-start-0 ps-0" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small text-muted fw-bold">Phone Number</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-telephone text-muted"></i></span>
                                        <input type="tel" id="checkout-phone" class="form-control border-start-0 ps-0" placeholder="079xxxxxxx" required>
                                    </div>
                                </div>
                            </div>

                            <hr class="my-4 border-secondary">

                            <!-- Address -->
                            <div class="mb-3">
                                <label class="form-label small text-muted fw-bold d-flex justify-content-between">
                                    <span>Delivery Address</span>
                                    <button type="button" id="detect-location-btn" class="btn btn-sm btn-outline-primary rounded-pill py-0 px-3">
                                        <i class="bi bi-geo-alt-fill"></i> Detect My Location
                                    </button>
                                </label>
                                <textarea id="checkout-address" class="form-control" rows="3" required placeholder="Enter full address..."></textarea>
                                <div class="form-text">We will deliver to this address securely.</div>
                            </div>

                            <hr class="my-4 border-secondary">

                            <!-- Delivery Region -->
                            <div class="mb-3">
                                <label class="form-label small text-muted fw-bold">Delivery Region</label>
                                <select id="delivery-region" class="form-select" required>
                                    <option value="" selected disabled>Loading regions...</option>
                                    <!-- Regions injected by checkout.js -->
                                </select>
                            </div>

                        </div>
                    </div>
                </div>

                <!-- RIGHT COLUMN: Order Summary (Sticky) -->
                <div class="col-lg-5">
                    <div class="card border-0 shadow-lg rounded-4 p-4 sticky-top" style="top: 100px; z-index: 10;">
                        <div class="card-header bg-white border-0 p-0 mb-4">
                            <h5 class="mb-0 fw-bold text-dark">
                                <i class="bi bi-receipt text-primary me-2"></i> Order Summary
                            </h5>
                        </div>
                        <div class="card-body p-0">
                            
                            <!-- Items List (Scrollable if long) -->
                            <div id="checkout-summary-items" class="mb-4" style="max-height: 250px; overflow-y: auto;">
                                <!-- Items injected by checkout.js -->
                            </div>

                            <hr class="border-secondary">

                            <!-- Financial Breakdown -->
                            <div class="d-flex justify-content-between mb-2">
                                <span class="text-muted">Subtotal</span>
                                <span id="checkout-subtotal" class="fw-bold text-dark">0.00 JOD</span>
                            </div>
                            <div class="d-flex justify-content-between mb-2">
                                <span class="text-muted">Shipping</span>
                                <span id="checkout-shipping" class="fw-bold text-dark">0.00 JOD</span>
                            </div>
                            
                            <!-- Discount Row (Hidden by default) -->
                            <div id="checkout-discount-row" class="d-flex justify-content-between mb-2 text-success d-none">
                                <span>Discount (<span id="coupon-type-display"></span>)</span>
                                <span id="checkout-discount" class="fw-bold">-0.00 JOD</span>
                            </div>

                            <hr class="border-secondary">

                            <!-- Total -->
                            <div class="d-flex justify-content-between mb-4 align-items-center">
                                <span class="fw-bold text-dark fs-5">Total Amount</span>
                                <span class="h4 fw-bold text-primary mb-0" id="checkout-total">0.00 JOD</span>
                            </div>

                            <!-- Submit Button -->
                            <button type="submit" id="place-order-btn" class="btn btn-primary w-100 py-3 rounded-pill shadow fw-bold">
                                Place Order <i class="bi bi-check-lg ms-2"></i>
                            </button>

                            <div class="text-center mt-3">
                                <a href="cart.html" class="text-decoration-none text-muted small hover-primary">
                                    &larr; Return to Cart
                                </a>
                            </div>

                        </div>
                    </div>
                </div>

            </div>
        </form>
    </main>

    <!-- =========================================
         FOOTER
         ========================================= -->
    <footer class="bg-white border-top mt-5 py-5">
        <div class="container text-center">
            <p class="mb-0 text-muted small">&copy; 2026 <span data-i18n="store_name">Loomi</span>. All Rights Reserved.</p>
        </div>
    </footer>

    <!-- Toast Container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toast-container"></div>

    <!-- =========================================
         SCRIPTS
         ========================================= -->
    
    <!-- 1. Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    
    <!-- 2. Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- 3. Application Logic -->
    <script src="js/supabase-config.js"></script>
    <script src="js/app.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/checkout.js"></script>
</body>
</html>
