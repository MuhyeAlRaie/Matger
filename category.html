    <!-- =========================================
         SCRIPTS
         ========================================= -->
    
    <!-- 1. Supabase Client -->

    <!-- 2. Bootstrap JS -->

    <!-- 3. Application Logic -->
    <script src="js/supabase-config.js"></script>
    <!-- <script src="js/app.js"></script> -->
    <script src="js/cart.js"></script>
    <script src="js/auth.js"></script>

<!-- Page Specific Script (Fixed) -->
<script>
    // ==========================================
    // 1. TRANSLATIONS DICTIONARY
    // ==========================================
    const i18n = {
        ar: {
            store_name: "متجري",
            nav_home: "الرئيسية",
            nav_categories: "الأقسام",
            nav_account: "حسابي",
            view_all: "عرض الكل",
            add_to_cart: "أضف للسلة",
            search_placeholder: "بحث..."
        },
        en: {
            store_name: "MyStore",
            nav_home: "Home",
            nav_categories: "Categories",
            nav_account: "My Account",
            view_all: "View All",
            add_to_cart: "Add to Cart",
            search_placeholder: "Search..."
        }
    };

    // ==========================================
    // 2. INITIALIZATION & STATE
    // ==========================================
    
    // Load language from LocalStorage (Default: Arabic)
    let currentLang = localStorage.getItem('app_language') || 'ar';

    // ==========================================
    // 3. HELPER FUNCTIONS
    // ==========================================
    
    // NEW: Function to update static UI text (Navbar, etc.)
    function applyTranslations() {
        document.querySelectorAll('[data-i18n]').forEach(element => {
            const key = element.getAttribute('data-i18n');
            if (i18n[currentLang] && i18n[currentLang][key]) {
                element.textContent = i18n[currentLang][key];
            }
        });
    }

    function getLocalizedField(obj, fieldName) {
        if (!obj) return '';
        const suffix = currentLang === 'ar' ? 'ar' : 'en';
        return obj[`${fieldName}_${suffix}`] || obj[`${fieldName}_ar`] || '';
    }

    function formatPrice(price) {
        if (!price) return '0.00 JOD';
        return parseFloat(price).toFixed(2) + ' ' + (currentLang === 'ar' ? 'د.أ' : 'JOD');
    }

    function toggleLoading(show) {
        const grid = document.getElementById('products-grid');
        if (!grid) return;
        if (show) {
            grid.innerHTML = `<div class="col-12 text-center py-5"><div class="spinner-border text-primary" role="status"></div></div>`;
        }
    }

    function showToast(message) {
        let container = document.getElementById('toast-container');
        if(!container) {
            container = createContainer();
        }
        const toast = document.createElement('div');
        toast.className = 'toast show bg-primary text-white border-0';
        toast.innerHTML = message;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function createContainer() {
        const container = document.createElement('div');
        container.className = 'toast-container position-fixed bottom-0 end-0 p-3';
        container.style.zIndex = '1050';
        document.body.appendChild(container);
        return container;
    }

    // ==========================================
    // 4. LANGUAGE SWITCHING LOGIC (UPDATED)
    // ==========================================
    
    function applyBootstrapDirection(lang) {
        const bootstrapLink = document.querySelector('link[href*="bootstrap"]');
        if (bootstrapLink) {
            if (lang === 'ar') {
                bootstrapLink.href = "https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css";
            } else {
                bootstrapLink.href = "https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css";
            }
        }
    }

    function toggleLanguage() {
        // 1. Switch State
        currentLang = currentLang === 'ar' ? 'en' : 'ar';
        localStorage.setItem('app_language', currentLang);

        // 2. Update HTML Direction & Attributes
        const html = document.documentElement;
        html.setAttribute('lang', currentLang);
        html.setAttribute('dir', currentLang === 'ar' ? 'rtl' : 'ltr');

        // 3. Update Bootstrap CSS
        applyBootstrapDirection(currentLang);

        // 4. NEW: Update Static Text (Navbar, Footer)
        applyTranslations();

        // 5. Update Button Text
        const langBtn = document.getElementById('lang-toggle');
        if(langBtn) {
            langBtn.textContent = currentLang === 'ar' ? 'English' : 'العربية';
        }

        // 6. Re-fetch Content
        loadSidebarCategories();
        
        const params = new URLSearchParams(window.location.search);
        const slug = params.get('slug');
        const searchQuery = params.get('search');

        if (searchQuery) {
            loadProducts({ search: searchQuery });
        } else if (slug && slug.length > 0) {
            loadProducts({ categorySlug: slug });
        } else {
            loadProducts({});
        }
    }

    // ==========================================
    // 5. LOAD SIDEBAR
    // ==========================================
    async function loadSidebarCategories() {
        const container = document.getElementById('sidebar-categories');
        const params = new URLSearchParams(window.location.search);
        const currentSlug = params.get('slug');

        if (!container) return;
        
        try {
            const { data: categories, error } = await supabase.from('categories').select('*');
            
            if (error) throw error;

            if (!categories || categories.length === 0) {
                container.innerHTML = `<div class="alert alert-warning text-center m-2">No categories found.</div>`;
                return;
            }

            let html = `<a href="category.html" class="list-group-item list-group-item-action border-0 mb-2 rounded-3 ${!currentSlug ? 'active text-primary' : ''}">
                                <i class="bi bi-grid-fill me-2"></i> ${i18n[currentLang].nav_home}
                             </a>`;
            
            categories.forEach(cat => {
                const name = currentLang === 'ar' ? cat.name_ar : cat.name_en;
                
                if(!cat.slug) return; 

                const isActive = currentSlug === cat.slug ? 'active bg-primary text-white' : 'hover-bg-light';
                
                html += `<a href="category.html?slug=${cat.slug}" class="list-group-item list-group-item-action border-0 mb-2 rounded-3 d-flex justify-content-between align-items-center ${isActive}">
                            <span>${name}</span>
                            <i class="bi bi-chevron-left small"></i>
                         </a>`;
            });
            
            container.innerHTML = html;
        } catch (e) { 
            console.error(e); 
            container.innerHTML = `<div class="alert alert-danger m-2">Error loading categories.</div>`;
        }
    }

    // ==========================================
    // 6. LOAD PRODUCTS
    // ==========================================
    async function loadProducts(filters = {}) {
        const grid = document.getElementById('products-grid');
        const emptyState = document.getElementById('empty-state');
        const countLabel = document.getElementById('results-count');
        
        if (!grid) return;

        toggleLoading(true);

        let query = supabase.from('products')
            .select(`*, categories (slug)`)
            .eq('is_active', true);

        if (filters.categorySlug) {
            query = query.eq('categories.slug', filters.categorySlug);
            updatePageTitle(filters.categorySlug);
        } else if (filters.search) {
            const term = `%${filters.search}%`;
            query = query.or(`name_ar.ilike.${term},name_en.ilike.${term}`);
            document.getElementById('page-title').textContent = `${i18n[currentLang].nav_categories}: "${filters.search}"`;
            document.getElementById('breadcrumb-current').textContent = "Search";
        } else {
             document.getElementById('page-title').textContent = i18n[currentLang].nav_categories;
        }

        const { data: products, error } = await query;

        grid.innerHTML = ''; 
        
        if (error) {
            console.error("Error loading products:", error);
            grid.innerHTML = `<div class="alert alert-danger p-3">Error loading products: ${error.message}</div>`;
        } else if (!products || products.length === 0) {
            grid.classList.add('d-none');
            emptyState.classList.remove('d-none');
            countLabel.textContent = '0 results';
        } else {
            grid.classList.remove('d-none');
            emptyState.classList.add('d-none');
            countLabel.textContent = `${products.length} results`;
            
                        products.forEach(prod => {
                if (filters.categorySlug && (!prod.categories || prod.categories.slug !== filters.categorySlug)) {
                    return;
                }

                const name = getLocalizedField(prod, 'name');
                const desc = getLocalizedField(prod, 'short_description'); // NEW: Get description
                
                // FIXED: Check if discount_price is greater than 0
                const hasDiscount = prod.discount_price && prod.discount_price > 0 && prod.discount_price < prod.price;
                const price = hasDiscount ? prod.discount_price : prod.price;
                
                const imgUrl = prod.image_url || 'https://via.placeholder.com/300';

                grid.innerHTML += `
                <div class="col-6 col-md-4 col-lg-4">
                    <div class="product-card h-100">
                        <a href="product.html?slug=${prod.slug}" class="text-decoration-none text-dark">
                            <div class="product-image-wrapper">
                                <img src="${imgUrl}" alt="${name}" loading="lazy">
                                ${hasDiscount ? `<span class="discount-badge">-${Math.round(((prod.price - prod.discount_price) / prod.price) * 100)}%</span>` : ''}
                            </div>
                            <div class="card-body">
                                <h5 class="product-title">${name}</h5>
                                
                                <!-- NEW: Short Description -->
                                <p class="product-short-desc">${desc || ''}</p>
                                
                                <div class="product-price">
                                    <!-- UPDATED: Added Currency to Old Price -->
                                    ${hasDiscount ? `<span class="old-price">${formatPrice(prod.price)}</span>` : ''}
                                    ${formatPrice(price)}
                                </div>
                                <button onclick="addToCart(${prod.id})" class="btn btn-primary w-100 mt-3 btn-sm">${i18n[currentLang].add_to_cart}</button>
                            </div>
                        </a>
                    </div>
                </div>`;
            });
        }
        toggleLoading(false);
    }

    async function updatePageTitle(slug) {
        if (!slug) return;
        try {
            const { data: catData } = await supabase.from('categories').select('name_ar, name_en').eq('slug', slug).single();
            if(catData) {
                const title = currentLang === 'ar' ? catData.name_ar : catData.name_en;
                document.getElementById('page-title').textContent = title;
                document.getElementById('breadcrumb-current').textContent = title;
            }
        } catch (e) { console.error("Error fetching category title", e); }
    }

    // ==========================================
    // 7. MAIN INITIALIZATION
    // ==========================================
    document.addEventListener('DOMContentLoaded', async () => {
        console.log("[Init] DOM Ready");

        // A. Set Initial Language Direction & CSS
        const html = document.documentElement;
        html.setAttribute('lang', currentLang);
        html.setAttribute('dir', currentLang === 'ar' ? 'rtl' : 'ltr');
        applyBootstrapDirection(currentLang);

        // B. NEW: Apply Static Translations (Navbar, Footer)
        applyTranslations();

        // C. Set Language Button Text
        const langBtn = document.getElementById('lang-toggle');
        if (langBtn) {
            langBtn.textContent = currentLang === 'ar' ? 'English' : 'العربية';
            langBtn.addEventListener('click', toggleLanguage);
        }
        
        // D. Load Content
        await loadSidebarCategories();

        const params = new URLSearchParams(window.location.search);
        const slug = params.get('slug');
        const searchQuery = params.get('search');

        if (searchQuery) {
            await loadProducts({ search: searchQuery });
        } else if (slug && slug.length > 0) {
            await loadProducts({ categorySlug: slug });
        } else {
            await loadProducts({});
        }
    });
</script>
    <script src="js/push-receiver.js"></script>
