<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التصنيف | Category</title>
    
    <!-- Bootstrap 5.3 RTL -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-store me-2"></i> <span data-i18n="store_name">متجري</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarContent">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center">
                    <li class="nav-item"><a class="nav-link" href="cart.html"><i class="fas fa-shopping-cart"></i> السلة</a></li>
                    <li class="nav-item" id="auth-links"><a class="nav-link" href="login.html">دخول</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- BREADCRUMB -->
    <div class="bg-light py-2 mb-4">
        <div class="container">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item"><a href="index.html" class="text-decoration-none">الرئيسية</a></li>
                    <li class="breadcrumb-item active" aria-current="page" id="breadcrumb-category">التصنيف</li>
                </ol>
            </nav>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <main class="container mb-5">
        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
            <h1 class="h2 fw-bold" id="category-title">جاري التحميل...</h1>
            <span class="badge bg-secondary" id="product-count">0 منتجات</span>
        </div>

        <!-- Products Grid -->
        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4" id="category-products">
            <!-- Products injected by JS -->
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="bg-dark text-white text-center py-3">
        <small>&copy; 2023 متجري. All Rights Reserved.</small>
    </footer>

    <!-- SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/app.js"></script>
    <script src="js/products.js"></script>
    <script src="js/cart.js"></script>

    <!-- Category Page Specific Script -->
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const catId = params.get('id');
            const lang = localStorage.getItem('lang') || 'ar';
            const nameField = lang === 'ar' ? 'name_ar' : 'name_en';

            if (!catId) {
                window.location.href = 'index.html';
                return;
            }

            // 1. Fetch Category Name
            const { data: category, error: catError } = await supabase
                .from('categories')
                .select('*')
                .eq('id', catId)
                .single();

            if (category) {
                document.title = `${category[nameField]} | متجري`;
                document.getElementById('category-title').textContent = category[nameField];
                document.getElementById('breadcrumb-category').textContent = category[nameField];
            }

            // 2. Fetch Products
            const products = await fetchProducts({ category_id: catId });
            
            // 3. Render
            renderProductCards(products, 'category-products');
            
            // 4. Update Count
            document.getElementById('product-count').textContent = products.length + ' ' + (lang === 'ar' ? 'منتجات' : 'Products');
        });
    </script>
</body>
</html>
