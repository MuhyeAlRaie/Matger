<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الأقسام | Categories</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

   <!-- Navigation -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
    <div class="container">
        <!-- Brand (Left) -->
        <a class="navbar-brand" href="index.html">
            <i class="bi bi-shop-window me-2"></i> <span data-i18n="store_name">متجري</span>
        </a>
        
        <!-- Right Side: Cart (Always Visible) & Menu Toggle -->
        <div class="d-flex align-items-center gap-3">
            <!-- Cart Button (Moved Here) -->
            <a href="cart.html" class="btn btn-sm btn-warning position-relative">
                <i class="bi bi-cart3"></i>
                <span id="cart-count" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
            </a>

            <!-- Mobile Menu Button -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>

        <!-- Collapsible Menu (Links, Language, Auth) -->
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" href="index.html" data-i18n="nav_home">الرئيسية</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="category.html" data-i18n="nav_categories">الأقسام</a>
                </li>
            </ul>
            
            <div class="d-flex align-items-center gap-3">
                <!-- Language Switcher -->
                <button id="lang-toggle" class="btn btn-sm btn-outline-light">English</button>
                
                <!-- Search (Optional - keeping it inside menu for cleanliness, or move out if preferred) -->
                <form class="d-none d-md-flex" role="search">
                    <div class="input-group input-group-sm">
                        <input class="form-control" type="search" id="search-input" placeholder="بحث..." aria-label="Search">
                        <button class="btn btn-outline-light" type="button"><i class="bi bi-search"></i></button>
                    </div>
                </form>

                <!-- Auth Buttons -->
                <div id="auth-buttons" class="d-flex gap-2">
                    <!-- Injected by JS -->
                    <a href="login.html" class="btn btn-sm btn-light"><i class="bi bi-person"></i></a>
                </div>
            </div>
        </div>
    </div>
</nav>

    <!-- Breadcrumb -->
    <div class="bg-light py-2 mb-4">
        <div class="container">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item"><a href="index.html" class="text-decoration-none">Home</a></li>
                    <li class="breadcrumb-item active" aria-current="page" id="breadcrumb-current">Category</li>
                </ol>
            </nav>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container mb-5">
        <div class="row">
            <!-- Sidebar -->
            <aside class="col-lg-3 mb-4">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white fw-bold">
                        <i class="bi bi-funnel me-2"></i> <span data-i18n="categories">الأقسام</span>
                    </div>
                    <div class="card-body p-0">
                        <div class="list-group list-group-flush" id="sidebar-categories">
                            <!-- Categories injected by JS -->
                            <div class="text-center p-3"><div class="spinner-border spinner-border-sm"></div></div>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- Product Grid -->
            <main class="col-lg-9">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4 id="page-title">All Products</h4>
                    <span class="text-muted small" id="results-count">Loading...</span>
                </div>

                <div id="products-grid" class="row g-4">
                    <!-- Products injected by JS -->
                </div>
                
                <!-- Empty State -->
                <div id="empty-state" class="text-center py-5 d-none">
                    <i class="bi bi-emoji-frown display-1 text-muted"></i>
                    <h3 class="mt-3">No products found</h3>
                    <a href="index.html" class="btn btn-primary mt-2">Back to Home</a>
                </div>
            </main>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4 mt-auto">
        <div class="container text-center">
            <p class="mb-0">&copy; 2023 <span data-i18n="store_name">متجري</span>. All Rights Reserved.</p>
        </div>
    </footer>

    <!-- Toast Container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toast-container"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="js/supabase-config.js"></script>
    <script src="js/app.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/auth.js"></script>

   <!-- Page Specific Script -->
<script>
    // ==========================================
    // HELPERS (Required because products.js is not loaded here)
    // ==========================================
    function getLocalizedField(obj, fieldName) {
        if (!obj) return '';
        const suffix = currentLang === 'ar' ? 'ar' : 'en';
        return obj[`${fieldName}_${suffix}`] || obj[`${fieldName}_ar`] || '';
    }

    function formatPrice(price) {
        if (!price) return '0.00 JOD';
        return parseFloat(price).toFixed(2) + ' ' + (currentLang === 'ar' ? 'د.أ' : 'JOD');
    }

    // ==========================================
    // LOAD SIDEBAR (Fixed Scope Error)
    // ==========================================
    async function loadSidebarCategories() {
        const container = document.getElementById('sidebar-categories');
        
        // FIX: Read URL params inside this function so 'slug' is defined here
        const params = new URLSearchParams(window.location.search);
        const currentSlug = params.get('slug');

        if (!container) return;
        try {
            const { data: categories } = await supabase.from('categories').select('*');
            let html = `<a href="category.html" class="list-group-item list-group-item-action ${!currentSlug ? 'active' : ''}">All Products</a>`;
            
            categories.forEach(cat => {
                const name = currentLang === 'ar' ? cat.name_ar : cat.name_en;
                // FIX: Use currentSlug (defined above) instead of global slug
                const isActive = currentSlug === cat.slug ? 'active' : '';
                html += `<a href="category.html?slug=${cat.slug}" class="list-group-item list-group-item-action ${isActive}">${name}</a>`;
            });
            container.innerHTML = html;
        } catch (e) { console.error(e); }
    }

    // ==========================================
    // LOAD PRODUCTS
    // ==========================================
    async function loadProducts(filters = {}) {
        const grid = document.getElementById('products-grid');
        const emptyState = document.getElementById('empty-state');
        const countLabel = document.getElementById('results-count');
        
        if (!grid) return;

        toggleLoading(true);

        let query = supabase.from('products').select(`*, categories (slug)`).eq('is_active', true);

        if (filters.categorySlug) {
            query = query.eq('categories.slug', filters.categorySlug);
            
            // Update Title
            const { data: catData } = await supabase.from('categories').select('name_ar, name_en').eq('slug', filters.categorySlug).single();
            if(catData) {
                const title = currentLang === 'ar' ? catData.name_ar : catData.name_en;
                document.getElementById('page-title').textContent = title;
                document.getElementById('breadcrumb-current').textContent = title;
            }
        }

        if (filters.search) {
            const term = `%${filters.search}%`;
            query = query.or(`name_ar.ilike.${term},name_en.ilike.${term}`);
        }

        const { data: products, error } = await query;

        grid.innerHTML = '';
        if (error || !products || products.length === 0) {
            grid.classList.add('d-none');
            emptyState.classList.remove('d-none');
            countLabel.textContent = '0 results';
        } else {
            countLabel.textContent = `${products.length} results`;
            
            // Render Products (Using helpers defined above)
            products.forEach(prod => {
                const name = getLocalizedField(prod, 'name');
                const price = prod.discount_price < prod.price ? prod.discount_price : prod.price;
                const imgUrl = prod.image_url || 'https://via.placeholder.com/300';
                const hasDiscount = prod.discount_price && prod.discount_price < prod.price;

                grid.innerHTML += `
                <div class="col-6 col-md-4 col-lg-4">
                    <div class="product-card h-100">
                        <a href="product.html?slug=${prod.slug}" class="text-decoration-none text-dark">
                            <div class="product-image-wrapper">
                                <img src="${imgUrl}" alt="${name}" loading="lazy">
                                ${hasDiscount ? `<span class="discount-badge">SALE</span>` : ''}
                            </div>
                            <div class="card-body">
                                <h5 class="product-title">${name}</h5>
                                <div class="product-price">
                                    ${hasDiscount ? `<span class="old-price">${prod.price}</span>` : ''}
                                    ${price} JOD
                                </div>
                                <button onclick="addToCart(${prod.id})" class="btn btn-primary w-100 mt-3 btn-sm">Add to Cart</button>
                            </div>
                        </a>
                    </div>
                </div>`;
            });
        }
        toggleLoading(false);
    }

    // ==========================================
    // INITIALIZATION
    // ==========================================
    document.addEventListener('DOMContentLoaded', async () => {
        // Load Sidebar first
        await loadSidebarCategories();

        // Determine what to load
        const params = new URLSearchParams(window.location.search);
        const slug = params.get('slug');
        const searchQuery = params.get('search');

        if (searchQuery) {
            document.getElementById('page-title').textContent = `Search: "${searchQuery}"`;
            document.getElementById('breadcrumb-current').textContent = "Search Results";
            await loadProducts({ search: searchQuery });
        } else if (slug) {
            await loadProducts({ categorySlug: slug });
        } else {
            await loadProducts({});
        }
    });
</script>
    <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js')
        .then(reg => console.log('Service Worker: Registered'))
        .catch(err => console.log('Service Worker: Error: ' + err));
    });
  }
</script>
<script src="js/push-receiver.js"></script>
</body>
</html>
