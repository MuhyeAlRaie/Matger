<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب جديد | Register</title>
    <meta name="description" content="أنشئ حساباً جديداً للاستمتاع بتجربة تسوق مميزة.">
    
    <!-- Bootstrap 5.3 RTL -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    
    <style>
        body {
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .register-card {
            max-width: 450px;
            margin: auto;
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-store me-2"></i> <span data-i18n="store_name">متجري</span>
            </a>
        </div>
    </nav>

    <!-- MAIN CONTENT -->
    <main class="container flex-grow-1 d-flex align-items-center justify-content-center py-5">
        <div class="card register-card p-4">
            <div class="card-body">
                <div class="text-center mb-4">
                    <h3 class="fw-bold">إنشاء حساب جديد</h3>
                    <p class="text-muted">انضم إلينا اليوم واحصل على أفضل العروض</p>
                </div>

                <!-- Alert Container for Auth Messages -->
                <div id="auth-alert" style="display: none;"></div>

                <form id="register-form">
                    <div class="mb-3">
                        <label for="reg-name" class="form-label">الاسم الكامل</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-user"></i></span>
                            <input type="text" class="form-control" id="reg-name" placeholder="الاسم الأول والأخير" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="reg-email" class="form-label">البريد الإلكتروني</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                            <input type="email" class="form-control" id="reg-email" placeholder="name@example.com" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="reg-password" class="form-label">كلمة المرور</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" class="form-control" id="reg-password" placeholder="********" required minlength="6">
                        </div>
                        <div class="form-text">يجب أن تكون كلمة المرور 6 أحرف على الأقل.</div>
                    </div>

                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" id="terms" required>
                        <label class="form-check-label" for="terms">
                            أوافق على <a href="#" class="text-primary">الشروط والأحكام</a>
                        </label>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg fw-bold">
                            تسجيل حساب
                        </button>
                    </div>
                </form>

                <div class="text-center mt-4">
                    <p class="mb-0">لديك حساب بالفعل؟ <a href="login.html" class="fw-bold text-primary">تسجيل الدخول</a></p>
                </div>
                
                <hr>
                
                <div class="text-center">
                    <a href="index.html" class="btn btn-outline-secondary btn-sm">
                        <i class="fas fa-arrow-right me-1"></i> العودة للرئيسية
                    </a>
                </div>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="bg-dark text-white text-center py-3">
        <small>&copy; 2023 متجري. All Rights Reserved.</small>
    </footer>

    <!-- SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <!-- app.js included for language consistency -->
    <script src="js/app.js"></script>
</body>
</html>
