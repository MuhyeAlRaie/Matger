<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب جديد | Register</title>
    
    <!-- Bootstrap 5.3 RTL CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <!-- Custom Modern CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- =========================================
         MODERN NAVIGATION
         ========================================= -->
    <nav class="navbar navbar-expand-lg navbar-light sticky-top">
        <div class="container">
            <!-- Brand -->
<a class="navbar-brand" href="index.html">
    <!-- Update 'src' to your actual logo file path -->
    <img src="images/loomi-logo.png" alt="Store Logo" class="brand-logo">
</a>

            <div class="d-flex align-items-center gap-3 order-lg-3">
                <a href="cart.html" class="btn rounded-pill position-relative btn-sm">
                    <i class="bi bi-cart3"></i>
                    <span id="cart-count" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
                </a>
                <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
            </div>

            <div class="collapse navbar-collapse order-lg-2" id="mainNav">
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link fw-bold" href="index.html" data-i18n="nav_home">الرئيسية</a></li>
                    <li class="nav-item"><a class="nav-link" href="category.html" data-i18n="nav_categories">الأقسام</a></li>
                </ul>
                
                <div class="d-flex align-items-center gap-3">
                    <button id="lang-toggle" class="btn btn-outline-primary rounded-pill btn-sm">English</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- =========================================
         MAIN CONTENT
         ========================================= -->
    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                
                <!-- Modern Register Card -->
                <div class="card shadow-lg rounded-4 border-0">
                    <div class="card-body p-5">
                        
                        <!-- Icon & Header -->
                        <div class="text-center mb-5">
                            <div class="mb-3">
                                <i class="bi bi-person-plus-fill display-1 text-primary"></i>
                            </div>
                            <h3 class="fw-bold text-dark mb-1" data-i18n="register_title">إنشاء حساب جديد</h3>
                            <p class="text-muted small">Join us today for exclusive offers and fast checkout.</p>
                        </div>

                        <!-- Error Alert -->
                        <div id="reg-error" class="alert alert-danger d-none rounded-3 border-0" role="alert"></div>

                        <!-- Register Form -->
                        <form id="register-form">
                            <!-- Email Field -->
                            <div class="mb-3">
                                <label for="reg-email" class="form-label small text-muted fw-bold text-uppercase">Email Address</label>
                                <div class="input-group input-group-lg">
                                    <span class="input-group-text bg-light border-end-0">
                                        <i class="bi bi-envelope text-muted"></i>
                                    </span>
                                    <input type="email" class="form-control border-start-0 ps-0" id="reg-email" placeholder="name@example.com" required>
                                </div>
                            </div>

                            <!-- Password Field -->
                            <div class="mb-3">
                                <label for="reg-password" class="form-label small text-muted fw-bold text-uppercase">Password</label>
                                <div class="input-group input-group-lg">
                                    <span class="input-group-text bg-light border-end-0">
                                        <i class="bi bi-lock text-muted"></i>
                                    </span>
                                    <input type="password" class="form-control border-start-0 ps-0" id="reg-password" placeholder="Min 6 characters" required minlength="6">
                                </div>
                            </div>

                            <!-- Submit Button -->
                            <button type="submit" class="btn btn-primary btn-lg w-100 py-3 rounded-pill shadow fw-bold">
                                Create Account <i class="bi bi-person-plus ms-2"></i>
                            </button>
                        </form>

                        <!-- Footer Link -->
                        <div class="text-center mt-5">
                            <span class="text-muted small">Already have an account? </span>
                            <a href="login.html" class="small fw-bold text-decoration-none text-primary hover-underline">Login</a>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </main>

    <!-- =========================================
         FOOTER
         ========================================= -->
    <footer class="bg-white border-top mt-5 py-5">
        <div class="container text-center">
            <p class="mb-0 text-muted small">&copy; 2023 <span data-i18n="store_name">Loomi</span>. All Rights Reserved.</p>
        </div>
    </footer>

    <!-- Toast Container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toast-container"></div>

    <!-- =========================================
         SCRIPTS
         ========================================= -->
    
    <!-- 1. Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    
    <!-- 2. Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- 3. Application Logic -->
    <script src="js/supabase-config.js"></script>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>

    <!-- Page Specific Script -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Redirect if already logged in
            if (currentUser) {
                window.location.href = 'account.html';
            }
        });
    </script>
</body>
</html>
